<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações - PJJ Pará Jiu-Jitsu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

        /* 🎨 VARIÁVEIS DOS TEMAS */
        :root {
            --vermelho-principal: #D10000;
            --vermelho-claro: #FF3B3B;
            --verde: #00C853;
            --amarelo: #FFC107;
            --cinza: #6B7280;
        }

        /* 🌙 TEMA ESCURO (PADRÃO) */
        .tema-escuro {
            --fundo-escuro: #121214;
            --fundo-card: #1A1A1F;
            --texto-branco: #FFFFFF;
            --texto-cinza: #B0B0B8;
            --borda: #29292E;
            --fundo-input: #0C0C0E;
        }

        /* ☀️ TEMA CLARO */
        .tema-claro {
            --fundo-escuro: #F8F9FA;
            --fundo-card: #FFFFFF;
            --texto-branco: #121214;
            --texto-cinza: #6B7280;
            --borda: #DEE2E6;
            --fundo-input: #FFFFFF;
        }

        html, body { 
            background: var(--fundo-escuro); 
            color: var(--texto-branco); 
            min-height: 100vh; 
            transition: background 0.3s ease, color 0.3s ease;
        }

        .btn-menu {
            display: none; position: fixed; top: 15px; left: 15px; z-index: 9999;
            background: var(--vermelho-principal); border: none; color: white;
            width: 48px; height: 48px; border-radius: 8px; font-size: 22px; cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .menu-lateral {
            width: 240px; background: var(--fundo-card); border-right: 1px solid var(--borda);
            padding: 30px 0; position: fixed; height: 100vh; top: 0; left: 0; z-index: 999;
            transition: transform 0.3s ease; overflow-y: auto;
        }
        .menu-lateral.aberto { transform: translateX(0); }
        .menu-lateral.fechado { transform: translateX(-100%); }

        .logo { text-align: center; margin-bottom: 40px; }
        .logo img { width: 90px; margin-bottom: 10px; }
        .logo h1 { font-size: 14px; font-weight: 700; line-height: 1.3; }

        .menu-navegacao ul { list-style: none; padding: 0 15px; }
        .menu-navegacao li a {
            display: flex; align-items: center; gap: 10px; padding: 12px 15px; margin-bottom: 5px;
            color: var(--texto-cinza); text-decoration: none; font-size: 14px; font-weight: 600; border-radius: 6px; transition: 0.2s;
        }
        .menu-navegacao li a.ativo, .menu-navegacao li a:hover { background: rgba(209,0,0,0.15); color: var(--vermelho-principal); }

        .conteudo { margin-left: 240px; padding: 35px 45px; min-height: 100vh; width: calc(100% - 240px); }

        .cabecalho { margin-bottom: 30px; }
        .titulo-pagina { font-size: 26px; font-weight: 800; position: relative; }
        .titulo-pagina::after { content: ''; position: absolute; bottom: -8px; left: 0; width: 70px; height: 3px; background: var(--vermelho-principal); }

        .card-config {
            background: var(--fundo-card); border: 1px solid var(--borda); border-radius: 10px;
            padding: 25px; margin-bottom: 25px;
        }
        .card-config h2 { font-size: 18px; font-weight: 700; margin-bottom: 20px; color: var(--vermelho-claro); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .form-grupo { display: flex; flex-direction: column; gap: 6px; }
        .form-grupo label { font-size: 14px; font-weight: 600; color: var(--texto-cinza); }
        .form-grupo input, .form-grupo select {
            padding: 12px; background: var(--fundo-input); border: 1px solid var(--borda);
            border-radius: 6px; color: var(--texto-branco); font-size: 14px;
        }

        /* SWITCH TEMA */
        .linha-tema { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; }
        .switch { position: relative; width: 55px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--cinza); transition: 0.3s; border-radius: 28px;
        }
        .slider:before {
            position: absolute; content: ""; height: 22px; width: 22px; left: 3px; bottom: 3px;
            background-color: white; transition: 0.3s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--vermelho-principal); }
        input:checked + .slider:before { transform: translateX(27px); }

        .botoes { margin-top: 20px; display: flex; gap: 12px; flex-wrap: wrap; }
        .btn { padding: 12px 24px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 14px; transition: 0.3s; }
        .btn-vermelho { background: var(--vermelho-principal); color: white; }
        .btn-vermelho:hover { background: var(--vermelho-claro); }
        .btn-verde { background: var(--verde); color: white; }
        .btn-verde:hover { background: #00E05C; }

        .alerta-sucesso {
            background: rgba(0, 200, 83, 0.15); border: 1px solid var(--verde); color: var(--verde);
            padding: 15px; border-radius: 6px; margin-bottom: 20px; display: none;
        }
        .alerta-erro {
            background: rgba(255, 59, 59, 0.15); border: 1px solid var(--vermelho-claro); color: var(--vermelho-claro);
            padding: 15px; border-radius: 6px; margin-bottom: 20px; display: none;
        }

        @media (max-width: 992px) {
            .conteudo { margin-left: 0; width: 100%; padding: 80px 20px 20px; }
            .btn-menu { display: flex; align-items: center; justify-content: center; }
            .menu-lateral { transform: translateX(-100%); }
            .menu-lateral.aberto { transform: translateX(0); }
        }
    </style>
</head>
<body class="tema-escuro">

    <button class="btn-menu" onclick="abrirFecharMenu()">
        <i class="fas fa-bars"></i>
    </button>

    <aside class="menu-lateral" id="menuLateral">
        <div class="logo">
            <img src="imagens/logopjj.png" alt="Logo PJJ">
            <h1>PJJ<br>Pará Jiu-Jitsu</h1>
        </div>
        <nav class="menu-navegacao">
            <ul>
                <li><a href="admin.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="alunos.html"><i class="fas fa-users"></i> Alunos</a></li>
                <li><a href="financeiro.html"><i class="fas fa-dollar-sign"></i> Financeiro</a></li>
                <li><a href="declaracao.html"><i class="fas fa-file-alt"></i> Declaração</a></li>
                <li><a href="relatorios.html"><i class="fas fa-chart-bar"></i> Relatórios</a></li>
                <li><a href="#" class="ativo"><i class="fas fa-cog"></i> Configurações</a></li>
                <li><a href="#" style="margin-top:20px;color:#FF4D4D" onclick="sair()"><i class="fas fa-sign-out-alt"></i> Sair</a></li>
            </ul>
        </nav>
    </aside>

    <main class="conteudo">
        <div class="cabecalho">
            <h1 class="titulo-pagina">Configurações do Sistema</h1>
        </div>

        <div class="alerta-sucesso" id="alertaSalvo">
            <i class="fas fa-check-circle"></i> Configurações salvas com sucesso!
        </div>
        <div class="alerta-erro" id="alertaErro">
            <i class="fas fa-exclamation-circle"></i> Erro: senhas não coincidem!
        </div>

        <!-- 🎨 APARENCIA -->
        <div class="card-config">
            <h2>🎨 Aparência</h2>
            <div class="linha-tema">
                <label style="font-size:15px; font-weight:600;">Tema Escuro / Claro</label>
                <label class="switch">
                    <input type="checkbox" id="alternarTema" onchange="mudarTema()">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <!-- 🏫 DADOS DA ACADEMIA -->
        <div class="card-config">
            <h2>🏫 Dados da Academia</h2>
            <div class="form-grid">
                <div class="form-grupo">
                    <label>Nome da Academia</label>
                    <input type="text" id="nomeAcademia" value="Pará Jiu-Jitsu">
                </div>
                <div class="form-grupo">
                    <label>CNPJ / Razão Social</label>
                    <input type="text" id="cnpjAcademia" placeholder="00.000.000/0001-00">
                </div>
                <div class="form-grupo">
                    <label>Endereço Completo</label>
                    <input type="text" id="enderecoAcademia" placeholder="Rua, Número, Bairro - Belém/PA">
                </div>
                <div class="form-grupo">
                    <label>Telefone Principal</label>
                    <input type="text" id="telefoneAcademia" placeholder="(91) 90000-0000">
                </div>
                <div class="form-grupo">
                    <label>E-mail de Contato da Academia</label>
                    <input type="email" id="emailAcademia" placeholder="contato@pjj.com.br">
                </div>
                <div class="form-grupo">
                    <label>Horário de Funcionamento</label>
                    <input type="text" id="horarioAcademia" placeholder="Seg-Sex: 08h às 20h">
                </div>
            </div>
        </div>

        <!-- 💰 VALORES DOS PLANOS -->
        <div class="card-config">
            <h2>💰 Valores Padrão dos Planos</h2>
            <div class="form-grid">
                <div class="form-grupo">
                    <label>Plano Mensal (R$)</label>
                    <input type="number" step="0.01" id="valorMensal" placeholder="100,00">
                </div>
                <div class="form-grupo">
                    <label>Plano Trimestral (R$)</label>
                    <input type="number" step="0.01" id="valorTrimestral" placeholder="285,00">
                </div>
                <div class="form-grupo">
                    <label>Plano Semestral (R$)</label>
                    <input type="number" step="0.01" id="valorSemestral" placeholder="540,00">
                </div>
                <div class="form-grupo">
                    <label>Plano Anual (R$)</label>
                    <input type="number" step="0.01" id="valorAnual" placeholder="960,00">
                </div>
            </div>
        </div>

        <!-- 🔒 ACESSO DO ADMINISTRADOR -->
        <div class="card-config">
            <h2>🔒 Dados de Acesso</h2>
            <div class="form-grid">
                <div class="form-grupo">
                    <label>E-mail do Administrador</label>
                    <input type="email" id="novoEmail" placeholder="admin@pjj.com.br">
                </div>
                <div class="form-grupo">
                    <label>Nova Senha</label>
                    <input type="password" id="novaSenha" placeholder="Deixe vazio para não alterar">
                </div>
                <div class="form-grupo">
                    <label>Confirmar Nova Senha</label>
                    <input type="password" id="confirmaSenha" placeholder="Repita a senha">
                </div>
            </div>
        </div>

        <div class="botoes">
            <button class="btn btn-verde" onclick="salvarConfiguracoes()"><i class="fas fa-save"></i> Salvar Alterações</button>
            <button class="btn btn-vermelho" onclick="history.back()"><i class="fas fa-arrow-left"></i> Voltar</button>
        </div>
    </main>

    <script>
        // Carrega tema salvo ao abrir a página
        function carregarTema() {
            const temaSalvo = localStorage.getItem('tema') || 'escuro';
            const corpo = document.body;
            const botaoTema = document.getElementById('alternarTema');

            if (temaSalvo === 'claro') {
                corpo.classList.remove('tema-escuro');
                corpo.classList.add('tema-claro');
                botaoTema.checked = true;
            } else {
                corpo.classList.remove('tema-claro');
                corpo.classList.add('tema-escuro');
                botaoTema.checked = false;
            }
        }

        // Alterna entre os temas
        function mudarTema() {
            const corpo = document.body;
            const botaoTema = document.getElementById('alternarTema');

            if (botaoTema.checked) {
                corpo.classList.remove('tema-escuro');
                corpo.classList.add('tema-claro');
                localStorage.setItem('tema', 'claro');
            } else {
                corpo.classList.remove('tema-claro');
                corpo.classList.add('tema-escuro');
                localStorage.setItem('tema', 'escuro');
            }
        }

        function abrirFecharMenu() {
            document.getElementById('menuLateral').classList.toggle('aberto');
        }

        function salvarConfiguracoes() {
            const senha = document.getElementById('novaSenha').value;
            const confirma = document.getElementById('confirmaSenha').value;
            const alertaSucesso = document.getElementById('alertaSalvo');
            const alertaErro = document.getElementById('alertaErro');

            alertaSucesso.style.display = 'none';
            alertaErro.style.display = 'none';

            // Valida senhas se forem alteradas
            if (senha !== '' && senha !== confirma) {
                alertaErro.style.display = 'block';
                setTimeout(() => alertaErro.style.display = 'none', 3500);
                return;
            }

            // Aqui futuramente ligamos ao Firebase para salvar acesso e dados
            alertaSucesso.style.display = 'block';
            setTimeout(() => alertaSucesso.style.display = 'none', 3500);
        }

        function sair() {
            if (confirm('Deseja sair do sistema?')) {
                window.location.href = 'login.html';
            }
        }

        // Inicializa tema ao carregar
        carregarTema();
    </script>

</body>
</html>
