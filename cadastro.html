<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - PJJ Pará Jiu-Jitsu</title>
    <link rel="stylesheet" href="css/estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), url('imagens/capactpjj.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        .voltar-inicio {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--branco);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .voltar-inicio:hover {
            color: var(--vermelho-principal);
        }

        .formulario-cadastro {
            background-color: var(--cinza-escuro);
            padding: 40px 30px;
            border-radius: 8px;
            width: 100%;
            max-width: 450px;
            border: 2px solid var(--vermelho-principal);
            box-shadow: 0 0 20px rgba(184, 0, 0, 0.2);
        }

        .logo-cadastro {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-cadastro img {
            height: 80px;
            object-fit: contain;
        }

        .formulario-cadastro h2 {
            text-align: center;
            margin-bottom: 25px;
            color: var(--branco);
            font-size: 2rem;
        }

        .grupo-campo {
            margin-bottom: 18px;
        }

        .grupo-campo label {
            display: block;
            margin-bottom: 6px;
            color: var(--texto-cinza);
            font-size: 0.9rem;
        }

        .grupo-campo input {
            width: 100%;
            padding: 10px 12px;
            background-color: var(--cinza-medio);
            border: 1px solid var(--vermelho-principal);
            color: var(--branco);
            border-radius: 4px;
            font-size: 0.95rem;
        }

        .grupo-campo input:focus {
            outline: none;
            border-color: var(--branco);
        }

        .termos {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 25px;
        }

        .termos label {
            margin: 0;
            font-size: 0.85rem;
            color: var(--texto-cinza);
        }

        .btn-cadastrar {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            background-color: var(--vermelho-principal);
            color: var(--branco);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-cadastrar:hover {
            background-color: var(--vermelho-escuro);
        }

        .link-login {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--texto-cinza);
        }

        .link-login a {
            color: var(--vermelho-principal);
            text-decoration: none;
            font-weight: 700;
        }

        .link-login a:hover {
            text-decoration: underline;
        }

        #mensagem {
            display: none;
            padding: 10px;
            text-align: center;
            border-radius: 4px;
            margin-bottom: 15px;
            font-weight: 500;
        }
        .sucesso { background-color: #2ecc71; color: white; }
        .erro { background-color: #e74c3c; color: white; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <script src="config-firebase.js"></script>
</head>
<body>

    <a href="index.html" class="voltar-inicio">
        <i class="fa-solid fa-arrow-left"></i> Voltar ao site
    </a>

    <div class="formulario-cadastro">
        <div class="logo-cadastro">
            <img src="imagens/logopjj.png" alt="PJJ Pará Jiu-Jitsu">
        </div>
        <h2>CRIE SUA CONTA</h2>

        <div id="mensagem"></div>

        <form id="formCadastro">
            <div class="grupo-campo">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" required>
            </div>

            <div class="grupo-campo">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="grupo-campo">
                <label for="telefone">Telefone / WhatsApp</label>
                <input type="tel" id="telefone" name="telefone" placeholder="(91) 9XXXX-XXXX" required>
            </div>

            <div class="grupo-campo">
                <label for="nascimento">Data de Nascimento</label>
                <input type="date" id="nascimento" name="nascimento" required>
            </div>

            <div class="grupo-campo">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" required minlength="6">
            </div>

            <div class="grupo-campo">
                <label for="confirmar-senha">Confirmar Senha</label>
                <input type="password" id="confirmar-senha" name="confirmar-senha" required>
            </div>

            <div class="termos">
                <input type="checkbox" id="termos" name="termos" required>
                <label for="termos">Eu aceito os termos de uso e política de privacidade</label>
            </div>

            <button type="submit" class="btn-cadastrar">Cadastrar</button>
        </form>

        <div class="link-login">
            Já tem uma conta? <a href="login.html">Faça login aqui</a>
        </div>
    </div>

    <script>
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function mostrarMensagem(texto, tipo) {
            const div = document.getElementById('mensagem');
            div.textContent = texto;
            div.className = tipo;
            div.style.display = 'block';
            setTimeout(() => div.style.display = 'none', 4000);
        }

        document.getElementById('formCadastro').addEventListener('submit', function(e) {
            e.preventDefault();

            const nome = document.getElementById('nome').value.trim();
            const email = document.getElementById('email').value.trim();
            const telefone = document.getElementById('telefone').value.trim();
            const nascimento = document.getElementById('nascimento').value;
            const senha = document.getElementById('senha').value;
            const confirmarSenha = document.getElementById('confirmar-senha').value;

            if (senha !== confirmarSenha) {
                mostrarMensagem("❌ As senhas não coincidem!", "erro");
                return;
            }

            auth.createUserWithEmailAndPassword(email, senha)
                .then((userCredential) => {
                    const usuario = userCredential.user;
                    return db.collection('usuarios').doc(usuario.uid).set({
                        nome: nome,
                        email: email,
                        telefone: telefone,
                        nascimento: nascimento,
                        tipo: "aluno",
                        dataCadastro: firebase.firestore.FieldValue.serverTimestamp()
                    });
                })
                .then(() => {
                    mostrarMensagem("✅ Cadastro realizado com sucesso!", "sucesso");
                    this.reset();
                    setTimeout(() => window.location.href = "login.html", 2000);
                })
                .catch((erro) => {
                    let mensagem = "Erro ao cadastrar!";
                    if (erro.code === 'auth/email-already-in-use') mensagem = "E-mail já cadastrado!";
                    if (erro.code === 'auth/weak-password') mensagem = "Senha muito fraca! Use pelo menos 6 caracteres.";
                    mostrarMensagem(mensagem, "erro");
                });
        });
    </script>

</body>
</html>
