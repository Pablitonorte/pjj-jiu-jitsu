<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - PJJ Pará Jiu-Jitsu</title>
    <link rel="stylesheet" href="css/estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --vermelho-principal: #D10000;
            --vermelho-claro: #FF3B3B;
            --vermelho-escuro: #A00000;
            --fundo-escuro: #121214;
            --fundo-card: #1A1A1F;
            --cinza-medio: #1E1E24;
            --texto-branco: #FFFFFF;
            --texto-cinza: #B0B0B8;
            --borda: #29292E;
            --sucesso: #00C853;
            --erro: #FF4D4D;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), url('imagens/capactpjj.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        .voltar-inicio {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--texto-branco);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .voltar-inicio:hover { color: var(--vermelho-principal); }

        .formulario-cadastro {
            background-color: var(--fundo-card);
            padding: 35px 30px;
            border-radius: 10px;
            width: 100%;
            max-width: 450px;
            border: 2px solid var(--vermelho-principal);
            box-shadow: 0 0 25px rgba(209, 0, 0, 0.25);
        }

        .logo-cadastro { text-align: center; margin-bottom: 25px; }
        .logo-cadastro img { height: 85px; object-fit: contain; }

        .formulario-cadastro h2 {
            text-align: center; margin-bottom: 30px; color: var(--texto-branco);
            font-size: 1.7rem; font-weight: 800;
        }

        .grupo-campo { margin-bottom: 20px; }
        .grupo-campo label {
            display: block; margin-bottom: 8px; color: var(--texto-cinza);
            font-size: 0.95rem; font-weight: 500;
        }
        .opcional { font-size: 0.85rem; font-weight: normal; color: var(--texto-cinza); }

        .grupo-campo input {
            width: 100%; padding: 13px; background-color: var(--fundo-escuro);
            border: 1px solid var(--borda); color: var(--texto-branco);
            border-radius: 6px; font-size: 1rem; transition: border 0.2s;
        }
        .grupo-campo input:focus {
            outline: none; border-color: var(--vermelho-principal);
            box-shadow: 0 0 0 2px rgba(209, 0, 0, 0.15);
        }

        .termos { display: flex; align-items: center; gap: 10px; margin-bottom: 25px; }
        .termos input[type="checkbox"] { width: auto; margin: 0; cursor: pointer; }
        .termos label { margin: 0; font-size: 0.9rem; color: var(--texto-cinza); cursor: pointer; }

        .btn-cadastrar {
            width: 100%; padding: 14px; font-size: 1.05rem; font-weight: 700;
            text-transform: uppercase; background-color: var(--vermelho-principal);
            color: var(--texto-branco); border: none; border-radius: 6px; cursor: pointer; transition: background 0.2s;
        }
        .btn-cadastrar:hover { background-color: var(--vermelho-claro); }

        .link-login {
            text-align: center; margin-top: 22px; font-size: 0.95rem; color: var(--texto-cinza);
        }
        .link-login a { color: var(--vermelho-principal); text-decoration: none; font-weight: 600; }
        .link-login a:hover { text-decoration: underline; }

        #mensagem {
            display: none; padding: 13px; text-align: center; border-radius: 6px;
            margin-bottom: 20px; font-weight: 600; font-size: 0.95rem;
        }
        .sucesso { background-color: rgba(0, 200, 83, 0.15); color: var(--sucesso); border: 1px solid rgba(0, 200, 83, 0.3); }
        .erro { background-color: rgba(255, 77, 77, 0.15); color: var(--erro); border: 1px solid rgba(255, 77, 77, 0.3); }

        @media (max-width: 480px) {
            .formulario-cadastro { padding: 28px 22px; }
            .formulario-cadastro h2 { font-size: 1.5rem; }
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
</head>
<body>

    <a href="index.html" class="voltar-inicio">
        <i class="fa-solid fa-arrow-left"></i> Voltar ao site
    </a>

    <div class="formulario-cadastro">
        <div class="logo-cadastro">
            <img src="imagens/logopjj.png" alt="PJJ Pará Jiu-Jitsu">
        </div>
        <h2>CRIE SUA CONTA</h2>

        <div id="mensagem"></div>

        <form id="formCadastro">
            <div class="grupo-campo">
                <label for="nome">Nome Completo *</label>
                <input type="text" id="nome" name="nome" required>
            </div>

            <div class="grupo-campo">
                <label for="email">E-mail <span class="opcional">(opcional)</span></label>
                <input type="email" id="email" name="email" placeholder="seuemail@exemplo.com">
            </div>

            <div class="grupo-campo">
                <label for="telefone">Telefone / WhatsApp *</label>
                <input type="tel" id="telefone" name="telefone" placeholder="(91) 9XXXX-XXXX" maxlength="15" required>
            </div>

            <div class="grupo-campo">
                <label for="nascimento">Data de Nascimento *</label>
                <input type="date" id="nascimento" name="nascimento" required>
            </div>

            <div class="grupo-campo">
                <label for="senha">Senha * (mínimo 6 caracteres)</label>
                <input type="password" id="senha" name="senha" required minlength="6">
            </div>

            <div class="grupo-campo">
                <label for="confirmar-senha">Confirmar Senha *</label>
                <input type="password" id="confirmar-senha" name="confirmar-senha" required>
            </div>

            <div class="termos">
                <input type="checkbox" id="termos" name="termos" required>
                <label for="termos">Eu aceito os termos de uso e política de privacidade</label>
            </div>

            <button type="submit" class="btn-cadastrar">Cadastrar</button>
        </form>

        <div class="link-login">
            Já tem uma conta? <a href="login.html">Faça login aqui</a>
        </div>
    </div>

    <script>
        // ✅ SUAS CHAVES DIRETAS - FUNCIONA EM QUALQUER APARELHO
        const firebaseConfig = {
            apiKey: "AIzaSyAwbIaioYPlQsHEz2bNh5ATi3cGicu12bw",
            authDomain: "pjj-para-jiu-jitsu.firebaseapp.com",
            projectId: "pjj-para-jiu-jitsu",
            storageBucket: "pjj-para-jiu-jitsu.firebasestorage.app",
            messagingSenderId: "72563195814",
            appId: "1:72563195814:web:5bc90e7bc0c51f415c1967"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function formatarTelefone(numero) {
            numero = numero.replace(/\D/g, '');
            if (numero.length === 11) return `(${numero.slice(0,2)}) ${numero.slice(2,7)}-${numero.slice(7)}`;
            if (numero.length === 10) return `(${numero.slice(0,2)}) ${numero.slice(2,6)}-${numero.slice(6)}`;
            return numero;
        }
        document.getElementById('telefone').addEventListener('input', function(){this.value = formatarTelefone(this.value);});

        function mostrarMensagem(texto, tipo){
            const div = document.getElementById('mensagem');
            div.textContent = texto; div.className = tipo; div.style.display = 'block';
            setTimeout(()=>div.style.display='none',6000);
        }

        document.getElementById('formCadastro').addEventListener('submit', async e=>{
            e.preventDefault();
            const nome = document.getElementById('nome').value.trim();
            const email = document.getElementById('email').value.trim();
            const telefone = document.getElementById('telefone').value.trim().replace(/\D/g,'');
            const nascimento = document.getElementById('nascimento').value;
            const senha = document.getElementById('senha').value;
            const confirmarSenha = document.getElementById('confirmar-senha').value;

            if(senha!==confirmarSenha) return mostrarMensagem("❌ As senhas não coincidem!", "erro");
            if(telefone.length<10 || telefone.length>11) return mostrarMensagem("❌ Telefone inválido com DDD!", "erro");
            if(email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return mostrarMensagem("❌ E-mail inválido!", "erro");

            try {
                mostrarMensagem("⏳ Cadastrando... Aguarde!", "sucesso");
                let emailFinal = email || `tel_${telefone}@pjj.com.br`;

                const usuarioCred = await auth.createUserWithEmailAndPassword(emailFinal, senha);
                const uid = usuarioCred.user.uid;

                // ✅ SALVA GARANTIDO NO BANCO
                await db.collection('usuarios').doc(uid).set({
                    nome, email: email||null, telefone, nascimento, tipo:"aluno",
                    dataCadastro: firebase.firestore.FieldValue.serverTimestamp()
                });

                mostrarMensagem("✅ CADASTRADO E SALVO COM SUCESSO!", "sucesso");
                document.getElementById('formCadastro').reset();
                setTimeout(()=>window.location.href="login.html",2500);

            } catch(erro){
                console.error(erro);
                let msg = "❌ Erro ao cadastrar. Tente novamente.";
                if(erro.code==='auth/email-already-in-use') msg = "❌ Este telefone/e-mail já está cadastrado!";
                if(erro.code==='auth/weak-password') msg = "❌ Senha precisa ter pelo menos 6 dígitos.";
                if(erro.code==='permission-denied') msg = "❌ Sem permissão! Atualize as Regras do Firestore no Firebase.";
                mostrarMensagem(msg,"erro");
            }
        });
    </script>

</body>
</html>
