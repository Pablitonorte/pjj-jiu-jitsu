<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - PJJ Pará Jiu-Jitsu</title>
    <link rel="stylesheet" href="css/estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)), url('imagens/capactpjj.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            margin: 0;
        }

        .voltar-inicio {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ffffff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            transition: color 0.3s;
            z-index: 10;
        }

        .voltar-inicio:hover {
            color: #D10000;
        }

        .formulario-login {
            background-color: #151515;
            padding: 35px 30px;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
            border: 2px solid #D10000;
            box-shadow: 0 0 25px rgba(209, 0, 0, 0.25);
        }

        .logo-login {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo-login img {
            height: 85px;
            width: auto;
            object-fit: contain;
        }

        .formulario-login h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #ffffff;
            font-size: 1.8rem;
            font-weight: 800;
        }

        .grupo-campo {
            margin-bottom: 20px;
        }

        .grupo-campo label {
            display: block;
            margin-bottom: 8px;
            color: #B0B0B0;
            font-size: 0.95rem;
        }

        .grupo-campo input {
            background-color: #0A0A0A;
            border: 1px solid #D10000;
            color: #ffffff;
            width: 100%;
            padding: 14px;
            border-radius: 6px;
            font-size: 1rem;
            transition: border 0.3s ease;
            margin: 0;
        }

        .grupo-campo input:focus {
            outline: none;
            border-color: #ffffff;
            box-shadow: 0 0 0 2px rgba(209, 0, 0, 0.2);
        }

        .esquecer-senha {
            text-align: right;
            margin-bottom: 25px;
        }

        .esquecer-senha a {
            color: #B0B0B0;
            font-size: 0.9rem;
            text-decoration: none;
            transition: color 0.3s;
            cursor: pointer;
        }

        .esquecer-senha a:hover {
            color: #D10000;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            background-color: #D10000;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .btn-login:hover {
            background-color: #FF1A1A;
            transform: translateY(-1px);
        }

        .link-cadastro {
            text-align: center;
            margin-top: 25px;
            font-size: 0.95rem;
            color: #B0B0B0;
        }

        .link-cadastro a {
            color: #D10000;
            text-decoration: none;
            font-weight: 700;
        }

        .link-cadastro a:hover {
            text-decoration: underline;
        }

        #mensagem {
            display: none;
            padding: 12px;
            text-align: center;
            border-radius: 6px;
            margin-bottom: 18px;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .sucesso { background-color: #2ecc71; color: white; }
        .erro { background-color: #e74c3c; color: white; }

        @media (max-width: 400px) {
            .formulario-login { padding: 25px 20px; }
            .formulario-login h2 { font-size: 1.5rem; }
        }
    </style>

    <!-- Bibliotecas do Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

</head>
<body>

    <a href="index.html" class="voltar-inicio">
        <i class="fa-solid fa-arrow-left"></i> Voltar ao site
    </a>

    <div class="formulario-login">
        <div class="logo-login">
            <img src="imagens/logopjj.png" alt="PJJ Pará Jiu-Jitsu">
        </div>
        <h2>FAÇA SEU LOGIN</h2>

        <div id="mensagem"></div>

        <form id="formLogin">
            <div class="grupo-campo">
                <label for="emailLogin">E-mail</label>
                <input type="email" id="emailLogin" name="emailLogin" required>
            </div>

            <div class="grupo-campo">
                <label for="senhaLogin">Senha</label>
                <input type="password" id="senhaLogin" name="senhaLogin" required>
            </div>

            <div class="esquecer-senha">
                <a onclick="recuperarSenha()">Esqueceu sua senha?</a>
            </div>

            <button type="submit" class="btn-login">Entrar</button>
        </form>

        <div class="link-cadastro">
            Ainda não tem conta? <a href="cadastro.html">Cadastre-se aqui</a>
        </div>
    </div>

    <script>
        // --------------------------
        // 🔧 CONFIGURAÇÃO DO FIREBASE (direto no código)
        // --------------------------
        const firebaseConfig = {
          apiKey: "AIzaSyAwbIaioYPlQsHEz2bNh5ATi3cGicu12bw",
          authDomain: "pjj-para-jiu-jitsu.firebaseapp.com",
          projectId: "pjj-para-jiu-jitsu",
          storageBucket: "pjj-para-jiu-jitsu.firebasestorage.app",
          messagingSenderId: "72563195814",
          appId: "1:72563195814:web:5bc90e7bc0c51f415c1967",
          measurementId: "G-S5K8S7GMS6"
        };

        // Inicializa o Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function mostrarMensagem(texto, tipo) {
            const div = document.getElementById('mensagem');
            div.textContent = texto;
            div.className = tipo;
            div.style.display = 'block';
            setTimeout(() => div.style.display = 'none', 4000);
        }

        document.getElementById('formLogin').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('emailLogin').value.trim();
            const senha = document.getElementById('senhaLogin').value.trim();

            auth.signInWithEmailAndPassword(email, senha)
                .then(async (userCredential) => {
                    const usuario = userCredential.user;
                    const doc = await db.collection('usuarios').doc(usuario.uid).get();
                    if (doc.exists) {
                        const dados = doc.data();
                        if (dados.tipo === 'admin') {
                            mostrarMensagem("🔐 Bem-vindo Administrador!", "sucesso");
                            setTimeout(() => window.location.href = "admin.html", 1000);
                        } else {
                            mostrarMensagem("✅ Bem-vindo à Área do Aluno!", "sucesso");
                            setTimeout(() => window.location.href = "aluno.html", 1000);
                        }
                    } else {
                        mostrarMensagem("❌ Cadastro não encontrado no sistema!", "erro");
                    }
                })
                .catch((erro) => {
                    let mensagem = "Erro ao fazer login!";
                    if (erro.code === 'auth/user-not-found') mensagem = "E-mail não cadastrado!";
                    if (erro.code === 'auth/wrong-password') mensagem = "Senha incorreta!";
                    if (erro.code === 'auth/invalid-email') mensagem = "Formato de e-mail inválido!";
                    mostrarMensagem(mensagem, "erro");
                });
        });

        function recuperarSenha() {
            const email = prompt("Digite o e-mail cadastrado para receber a redefinição:");
            if (email) {
                auth.sendPasswordResetEmail(email)
                    .then(() => mostrarMensagem("📩 E-mail enviado! Verifique sua caixa de entrada.", "sucesso"))
                    .catch(() => mostrarMensagem("E-mail não encontrado ou inválido!", "erro"));
            }
        }
    </script>

</body>
</html>
