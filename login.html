<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Teste Simples</title>
</head>
<body>

    <h2>Teste de Funcionamento</h2>
    <div id="resultado" style="padding:15px; background:#f0f0f0; margin:15px 0;">Aguardando clique...</div>

    <form id="meuFormulario">
        <input type="email" id="email" placeholder="Digite seu e-mail" style="width:100%; padding:10px; margin:8px 0;">
        <br>
        <input type="password" id="senha" placeholder="Digite sua senha" style="width:100%; padding:10px; margin:8px 0;">
        <br>
        <button type="submit" style="padding:10px 20px; background:red; color:white; border:none;">Entrar</button>
    </form>

    <script>
        // ESSE CÓDIGO É 100% GARANTIDO DE FUNCIONAR
        const form = document.getElementById('meuFormulario');
        const divResultado = document.getElementById('resultado');

        form.addEventListener('submit', function(e) {
            e.preventDefault(); // IMPEDIR LIMPAR OS CAMPOS

            divResultado.textContent = "✅ O CÓDIGO ESTÁ FUNCIONANDO! Os campos não vão mais limpar.";
            divResultado.style.background = "#d4edda";
            divResultado.style.color = "#155724";
        });
    </script>

</body>
</html>
