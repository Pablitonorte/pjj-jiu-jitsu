<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PJJ Pará Jiu-Jitsu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

        :root {
            --vermelho-principal: #D10000;
            --vermelho-claro: #FF3B3B;
            --fundo-escuro: #121214;
            --fundo-card: #1A1A1F;
            --texto-branco: #FFFFFF;
            --texto-cinza: #B0B0B8;
            --borda: #29292E;
            --sucesso: #00C853;
            --erro: #FF4D4D;
            --info: #FFC107;
        }

        body {
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('imagens/capactpjj.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .caixa-login {
            background-color: var(--fundo-card);
            padding: 35px 30px;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
            border: 2px solid var(--vermelho-principal);
            box-shadow: 0 0 25px rgba(209, 0, 0, 0.25);
        }

        .logo { 
            text-align: center; 
            margin-bottom: 25px; 
        }

        .logo img { 
            height: 85px; 
        }

        h2 {
            text-align: center;
            color: var(--texto-branco);
            margin-bottom: 30px;
            font-size: 1.6rem;
            font-weight: 700;
        }

        .campo { 
            margin-bottom: 22px; 
        }

        label {
            display: block;
            color: var(--texto-cinza);
            margin-bottom: 8px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 13px;
            background-color: var(--fundo-escuro);
            border: 1px solid var(--borda);
            color: var(--texto-branco);
            border-radius: 6px;
            font-size: 1rem;
            transition: border 0.2s;
        }

        input:focus { 
            outline: none; 
            border-color: var(--vermelho-principal);
            box-shadow: 0 0 0 2px rgba(209, 0, 0, 0.15);
        }

        .btn-entrar {
            width: 100%;
            padding: 14px;
            background-color: var(--vermelho-principal);
            color: var(--texto-branco);
            border: none;
            border-radius: 6px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 15px;
        }

        .btn-entrar:hover { 
            background-color: var(--vermelho-claro); 
        }

        /* ✅ Botão Voltar para o Início */
        .btn-voltar {
            width: 100%;
            padding: 12px;
            background-color: transparent;
            color: var(--texto-cinza);
            border: 1px solid var(--borda);
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-voltar:hover {
            color: var(--vermelho-principal);
            border-color: var(--vermelho-principal);
            background-color: rgba(209, 0, 0, 0.08);
        }

        #mensagem {
            margin-top: 18px;
            padding: 13px;
            border-radius: 6px;
            text-align: center;
            font-weight: 600;
            display: none;
            font-size: 0.95rem;
        }

        .sucesso { background-color: rgba(0, 200, 83, 0.15); color: var(--sucesso); border: 1px solid rgba(0, 200, 83, 0.3); }
        .erro { background-color: rgba(255, 77, 77, 0.15); color: var(--erro); border: 1px solid rgba(255, 77, 77, 0.3); }
        .info { background-color: rgba(255, 193, 7, 0.15); color: var(--info); border: 1px solid rgba(255, 193, 7, 0.3); }

        /* Responsivo */
        @media (max-width: 400px) {
            .caixa-login {
                padding: 25px 20px;
            }
        }
    </style>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
</head>
<body>

    <div class="caixa-login">
        <div class="logo">
            <img src="imagens/logopjj.png" alt="Logo PJJ Pará Jiu-Jitsu">
        </div>
        <h2>Acesse sua conta</h2>

        <div id="mensagem"></div>

        <form id="formLogin">
            <div class="campo">
                <label>E-mail</label>
                <input type="email" id="email" required>
            </div>
            <div class="campo">
                <label>Senha</label>
                <input type="password" id="senha" required>
            </div>
            <button type="submit" class="btn-entrar">Entrar</button>
        </form>

        <!-- ✅ Botão de Voltar para o Início -->
        <a href="index.html" class="btn-voltar">
            <i class="fas fa-arrow-left"></i> Voltar para o Início
        </a>
    </div>

    <script>
        // Configuração do Firebase
        const firebaseConfig = {
          apiKey: "AIzaSyAwbIaioYPlQsHEz2bNh5ATi3cGicu12bw",
          authDomain: "pjj-para-jiu-jitsu.firebaseapp.com",
          projectId: "pjj-para-jiu-jitsu",
          storageBucket: "pjj-para-jiu-jitsu.firebasestorage.app",
          messagingSenderId: "72563195814",
          appId: "1:72563195814:web:5bc90e7bc0c51f415c1967"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Função para exibir mensagens
        function mostrarMensagem(texto, tipo) {
            const el = document.getElementById('mensagem');
            el.textContent = texto;
            el.className = tipo;
            el.style.display = 'block';
        }

        // Lógica do login
        document.getElementById('formLogin').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value.trim();

            mostrarMensagem("🔄 Verificando dados...", "info");

            auth.signInWithEmailAndPassword(email, senha)
            .then(resultado => {
                const usuario = resultado.user;
                console.log("Usuário autenticado:", usuario.uid);
                return db.collection('usuarios').doc(usuario.uid).get();
            })
            .then(doc => {
                if (!doc.exists) {
                    throw new Error("Conta existe, mas não tem cadastro no sistema!");
                }

                const dados = doc.data();
                console.log("Dados do usuário:", dados);

                if (dados.tipo === "admin") {
                    mostrarMensagem("✅ Acesso de Administrador! Entrando...", "sucesso");
                    setTimeout(() => {
                        window.location.href = "admin.html";
                    }, 1200);
                } else if (dados.tipo === "aluno") {
                    mostrarMensagem("✅ Acesso de Aluno! Entrando...", "sucesso");
                    setTimeout(() => {
                        window.location.href = "aluno.html";
                    }, 1200);
                } else {
                    throw new Error("Tipo de usuário não definido: " + dados.tipo);
                }
            })
            .catch(erro => {
                console.error("Erro completo:", erro);
                let msg;

                switch(erro.code) {
                    case "auth/user-not-found":
                        msg = "❌ E-mail não cadastrado";
                        break;
                    case "auth/wrong-password":
                        msg = "❌ Senha incorreta";
                        break;
                    case "auth/invalid-email":
                        msg = "❌ Formato de e-mail inválido";
                        break;
                    case "auth/network-request-failed":
                        msg = "❌ Sem conexão com a internet";
                        break;
                    default:
                        msg = "❌ " + erro.message;
                }

                mostrarMensagem(msg, "erro");
            });
        });
    </script>

</body>
</html>
