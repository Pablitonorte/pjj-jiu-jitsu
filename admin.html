<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - PJJ Pará Jiu-Jitsu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        :root {
            --fundo-escuro: #121214; --fundo-card: #1A1A1F; --vermelho-principal: #D10000;
            --texto-branco: #FFFFFF; --texto-cinza: #B0B0B8; --borda: #29292E;
            --verde: #00C853; --azul: #2563eb; --amarelo: #FFC107;
        }

        html, body { background: var(--fundo-escuro); color: var(--texto-branco); min-height: 100vh; }

        .btn-menu {
            display: none; position: fixed; top: 15px; left: 15px; z-index: 9999;
            background: var(--vermelho-principal); border: none; color: white;
            width: 48px; height: 48px; border-radius: 8px; font-size: 22px; cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .menu-lateral {
            width: 240px; background: var(--fundo-escuro); border-right: 1px solid var(--borda);
            padding: 30px 0; position: fixed; height: 100vh; top: 0; left: 0; z-index: 999;
            transition: transform 0.3s ease; overflow-y: auto;
        }
        .menu-lateral.aberto { transform: translateX(0); }
        .menu-lateral.fechado { transform: translateX(-100%); }

        .logo { text-align: center; margin-bottom: 40px; }
        .logo img { width: 90px; margin-bottom: 10px; }
        .logo h1 { font-size: 14px; font-weight: 700; line-height: 1.3; }

        .menu-navegacao ul { list-style: none; padding: 0 15px; }
        .menu-navegacao li a {
            display: flex; align-items: center; gap: 10px; padding: 12px 15px; margin-bottom: 5px;
            color: var(--texto-cinza); text-decoration: none; font-size: 14px; font-weight: 600; border-radius: 6px; transition: 0.2s;
        }
        .menu-navegacao li a.ativo, .menu-navegacao li a:hover { background: rgba(209,0,0,0.15); color: var(--vermelho-principal); }

        .conteudo {
            margin-left: 240px;
            padding: 35px 45px;
            min-height: 100vh;
            width: calc(100% - 240px);
        }

        .titulo-pagina { font-size: 26px; font-weight: 800; margin-bottom: 30px; position: relative; }
        .titulo-pagina::after { content: ''; position: absolute; bottom: -8px; left: 0; width: 70px; height: 3px; background: var(--vermelho-principal); }

        .grid-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card-resumo { background: var(--fundo-card); border: 1px solid var(--borda); border-radius: 10px; padding: 25px; display: flex; align-items: center; justify-content: space-between; }
        .card-resumo .info h3 { font-size: 14px; font-weight: 600; color: var(--texto-cinza); margin-bottom: 8px; }
        .card-resumo .info p { font-size: 28px; font-weight: 800; color: var(--texto-branco); }
        .card-resumo .icone { font-size: 36px; opacity: 0.2; color: var(--vermelho-principal); }

        .grid-graficos { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 30px; }
        .card-grafico { background: var(--fundo-card); border: 1px solid var(--borda); border-radius: 10px; padding: 25px; }
        .card-grafico h4 { margin-bottom: 20px; font-size: 16px; font-weight: 700; }

        .card-lista { background: var(--fundo-card); border: 1px solid var(--borda); border-radius: 10px; padding: 25px; }
        .card-lista h4 { margin-bottom: 20px; font-size: 16px; font-weight: 700; }
        .card-lista ul { list-style: none; }
        .card-lista li { padding: 12px 0; border-bottom: 1px solid var(--borda); font-size: 14px; color: var(--texto-cinza); }
        .card-lista li:last-child { border-bottom: none; }

        @media (max-width: 992px) {
            .conteudo { margin-left: 0; width: 100%; padding: 80px 20px 20px; }
            .btn-menu { display: flex; align-items: center; justify-content: center; }
            .menu-lateral { transform: translateX(-100%); }
            .menu-lateral.aberto { transform: translateX(0); }
            .grid-graficos { grid-template-columns: 1fr; }
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
</head>
<body>

    <button class="btn-menu" onclick="abrirFecharMenu()">
        <i class="fas fa-bars"></i>
    </button>

    <aside class="menu-lateral" id="menuLateral">
        <div class="logo">
            <img src="imagens/logopjj.png" alt="Logo PJJ">
            <h1>PJJ<br>Pará Jiu-Jitsu</h1>
        </div>
        <nav class="menu-navegacao">
            <ul>
                <li><a href="#" class="ativo"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="alunos.html"><i class="fas fa-users"></i> Alunos</a></li>
                <li><a href="financeiro.html"><i class="fas fa-dollar-sign"></i> Financeiro</a></li>
                <li><a href="relatorios.html"><i class="fas fa-chart-bar"></i> Relatórios</a></li>
                <li><a href="configuracoes.html"><i class="fas fa-cog"></i> Configurações</a></li>
                <li><a href="#" style="margin-top:20px;color:#FF4D4D" onclick="sair()"><i class="fas fa-sign-out-alt"></i> Sair</a></li>
            </ul>
        </nav>
    </aside>

    <main class="conteudo">
        <h1 class="titulo-pagina">Painel de Controle</h1>

        <div class="grid-cards">
            <div class="card-resumo">
                <div class="info">
                    <h3>Total de Alunos</h3>
                    <p id="totalAlunos">0</p>
                </div>
                <div class="icone"><i class="fas fa-users"></i></div>
            </div>
            <div class="card-resumo">
                <div class="info">
                    <h3>Plano Mensal</h3>
                    <p id="planoMensal">0</p>
                </div>
                <div class="icone"><i class="fas fa-calendar-day"></i></div>
            </div>
            <div class="card-resumo">
                <div class="info">
                    <h3>Plano Trimestral</h3>
                    <p id="planoTrimestral">0</p>
                </div>
                <div class="icone"><i class="fas fa-calendar-week"></i></div>
            </div>
            <div class="card-resumo">
                <div class="info">
                    <h3>Planos Semestral/Anual</h3>
                    <p id="planoLongo">0</p>
                </div>
                <div class="icone"><i class="fas fa-calendar-alt"></i></div>
            </div>
        </div>

        <div class="grid-graficos">
            <div class="card-grafico">
                <h4>Distribuição por Planos</h4>
                <canvas id="graficoPlanos" height="250"></canvas>
            </div>
            <div class="card-lista">
                <h4>Últimos Cadastros</h4>
                <ul id="ultimosCadastros"></ul>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAwbIaioYPlQsHEz2bNh5ATi3cGicu12bw",
          authDomain: "pjj-para-jiu-jitsu.firebaseapp.com",
          projectId: "pjj-para-jiu-jitsu",
          storageBucket: "pjj-para-jiu-jitsu.firebasestorage.app",
          messagingSenderId: "72563195814",
          appId: "1:72563195814:web:5bc90e7bc0c51f415c1967"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function abrirFecharMenu() {
            document.getElementById('menuLateral').classList.toggle('aberto');
        }

        let graficoPlanos;

        async function carregarDadosDashboard() {
            try {
                const snapshot = await db.collection('alunos').orderBy('nome', 'asc').get();
                const total = snapshot.size;
                let mensal = 0, trimestral = 0, semestral = 0, anual = 0;
                const ultimos = [];

                snapshot.forEach(doc => {
                    const d = doc.data();
                    const plano = d.periodo || 'Não informado';
                    if (plano === 'Mensal') mensal++;
                    else if (plano === 'Trimestral') trimestral++;
                    else if (plano === 'Semestral') semestral++;
                    else if (plano === 'Anual') anual++;

                    if (ultimos.length < 5) ultimos.push(d);
                });

                document.getElementById('totalAlunos').textContent = total;
                document.getElementById('planoMensal').textContent = mensal;
                document.getElementById('planoTrimestral').textContent = trimestral;
                document.getElementById('planoLongo').textContent = semestral + anual;

                const ctx = document.getElementById('graficoPlanos').getContext('2d');
                if (graficoPlanos) graficoPlanos.destroy();
                graficoPlanos = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Mensal', 'Trimestral', 'Semestral', 'Anual'],
                        datasets: [{
                            data: [mensal, trimestral, semestral, anual],
                            backgroundColor: ['#2563eb', '#FFC107', '#9C27B0', '#00C853'],
                            borderWidth: 0
                        }]
                    },
                    options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
                });

                const lista = document.getElementById('ultimosCadastros');
                lista.innerHTML = '';
                ultimos.forEach(d => {
                    lista.innerHTML += `<li>${d.nome} - ${d.periodo || 'Plano não informado'}</li>`;
                });

            } catch (erro) {
                console.error('Erro ao carregar dados do painel:', erro);
            }
        }

        auth.onAuthStateChanged(usuario => {
            if (!usuario) {
                window.location.href = 'login.html';
            } else {
                carregarDadosDashboard();
            }
        });

        function sair() {
            if (confirm('Deseja realmente sair?')) {
                auth.signOut().then(() => window.location.href = 'login.html');
            }
        }
    </script>
</body>
</html>
