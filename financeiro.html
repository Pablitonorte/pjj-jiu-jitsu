<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financeiro - PJJ Pará Jiu-Jitsu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        :root { --vermelho-principal: #D10000; --fundo-escuro: #121214; --fundo-card: #1A1A1F; --texto-branco: #FFFFFF; --texto-cinza: #B0B0B8; --borda: #29292E; }
        body { background: var(--fundo-escuro); color: var(--texto-branco); padding: 30px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 28px; font-weight: 800; margin-bottom: 25px; color: var(--vermelho-principal); }
        .tabela { width: 100%; background: var(--fundo-card); border-radius: 10px; border: 1px solid var(--borda); overflow: hidden; }
        .cabecalho { display: flex; background: rgba(255,255,255,0.05); padding: 15px; font-weight: 700; font-size: 13px; text-transform: uppercase; color: var(--texto-cinza); }
        .linha { display: flex; padding: 15px; border-bottom: 1px solid var(--borda); align-items: center; }
        .linha:last-child { border-bottom: none; }
        .col-nome { width: 35%; font-weight: bold; }
        .col-tipo { width: 20%; }
        .col-plano { width: 20%; }
        .col-valor { width: 15%; }
        .col-status { width: 10%; }
        .carregando { text-align: center; padding: 50px; color: var(--texto-cinza); font-size: 16px; }
        .erro { text-align: center; padding: 50px; color: #ff4444; font-size: 16px; }
    </style>

    <!-- MESMOS LINKS DO FIREBASE QUE FUNCIONAM NA PÁGINA DE ALUNOS -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="js/config-firebase.js"></script>
</head>
<body>
    <div class="container">
        <h1>Controle Financeiro</h1>
        <div class="tabela" id="listaAlunos">
            <div class="carregando">🔄 Carregando dados...</div>
        </div>
    </div>

    <script>
        // MESMA INICIALIZAÇÃO DA PÁGINA DE ALUNOS
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const lista = document.getElementById('listaAlunos');

        // MESMA FUNÇÃO DE BUSCA QUE FUNCIONA
        async function carregarLista() {
            try {
                console.log('📡 Iniciando busca...');
                const snapshot = await db.collection('alunos').get();
                console.log('✅ Busca concluída, documentos:', snapshot.size);

                if (snapshot.empty) {
                    lista.innerHTML = '<div class="erro">Nenhum aluno encontrado na coleção "alunos"</div>';
                    return;
                }

                let html = `
                <div class="cabecalho">
                    <div class="col-nome">Nome</div>
                    <div class="col-tipo">Tipo</div>
                    <div class="col-plano">Plano</div>
                    <div class="col-valor">Valor</div>
                    <div class="col-status">Status</div>
                </div>`;

                snapshot.forEach(doc => {
                    const d = doc.data();
                    html += `
                    <div class="linha">
                        <div class="col-nome">${d.nome || 'Sem nome'}</div>
                        <div class="col-tipo">${d.tipo || '-'}</div>
                        <div class="col-plano">${d.plano || d.periodo || '-'}</div>
                        <div class="col-valor">R$ ${d.valorMensal || d.valorPlano || '0,00'}</div>
                        <div class="col-status">${d.statusPagamento || 'Pendente'}</div>
                    </div>`;
                });

                lista.innerHTML = html;
                console.log('✅ Lista carregada com sucesso!');

            } catch (erro) {
                console.error('❌ ERRO:', erro);
                lista.innerHTML = `<div class="erro">❌ Falha: ${erro.message}<br>Verifique o console do navegador para detalhes</div>`;
            }
        }

        // MESMA VERIFICAÇÃO DE LOGIN
        auth.onAuthStateChanged(usuario => {
            if (!usuario) {
                window.location.href = 'login.html';
            } else {
                console.log('✅ Usuário logado:', usuario.email);
                carregarLista();
            }
        });
    </script>
</body>
</html>
