<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financeiro - PJJ Pará Jiu-Jitsu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        :root {
            --fundo-escuro: #121214; --fundo-card: #1A1A1F; --vermelho-principal: #D10000;
            --vermelho-claro: #FF3B3B; --texto-branco: #FFFFFF; --texto-cinza: #B0B0B8; --borda: #29292E;
            --verde: #00C853; --amarelo: #FFC107; --azul: #2563eb;
        }
        body { background: var(--fundo-escuro); color: var(--texto-branco); min-height: 100vh; overflow-x: hidden; }

        .btn-menu {
            display: none; position: fixed; top: 15px; left: 15px; z-index: 9999;
            background: var(--vermelho-principal); border: none; color: white;
            width: 48px; height: 48px; border-radius: 8px; font-size: 22px; cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .menu-lateral {
            width: 240px; background: var(--fundo-escuro); border-right: 1px solid var(--borda);
            padding: 30px 0; position: fixed; height: 100vh; top: 0; left: 0; z-index: 999;
            transition: transform 0.3s ease;
        }
        .menu-lateral.fechado { transform: translateX(-100%); }

        .logo { text-align: center; margin-bottom: 40px; }
        .logo img { width: 90px; margin-bottom: 10px; }
        .logo h1 { font-size: 14px; font-weight: 700; line-height: 1.3; }

        .menu-navegacao ul { list-style: none; padding: 0 15px; }
        .menu-navegacao li a {
            display: flex; align-items: center; gap: 10px; padding: 12px 15px; margin-bottom: 5px;
            color: var(--texto-cinza); text-decoration: none; font-size: 14px; font-weight: 600; border-radius: 6px; transition: 0.2s;
        }
        .menu-navegacao li a.ativo, .menu-navegacao li a:hover { background: rgba(209,0,0,0.15); color: var(--vermelho-principal); }

        .conteudo { margin-left: 240px; padding: 35px 45px; padding-top: 30px; min-height: 100vh; }
        .cabecalho {
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 25px;
        }
        .titulo-pagina { font-size: 26px; font-weight: 800; position: relative; }
        .titulo-pagina::after { content: ''; position: absolute; bottom: -8px; left: 0; width: 70px; height: 3px; background: var(--vermelho-principal); }

        .card-filtro { background: var(--fundo-card); border: 1px solid var(--borda); border-radius: 10px; padding: 20px; margin-bottom: 25px; display: flex; gap: 15px; flex-wrap: wrap; }
        .card-filtro input, .card-filtro select {
            flex: 1; min-width: 180px; padding: 12px; background: var(--fundo-escuro); border: 1px solid var(--borda);
            border-radius: 6px; color: white; font-size: 14px; outline: none;
        }
        .card-filtro input:focus, .card-filtro select:focus { border-color: var(--vermelho-principal); }

        .tabela { width: 100%; border-collapse: collapse; background: var(--fundo-card); border: 1px solid var(--borda); border-radius: 10px; overflow: hidden; }
        .tabela th { background: #1f1f25; padding: 15px; text-align: left; font-size: 13px; font-weight: 700; color: var(--texto-cinza); text-transform: uppercase; }
        .tabela td { padding: 15px; border-bottom: 1px solid var(--borda); font-size: 14px; }
        .tabela tr:hover { background: rgba(255,255,255,0.03); }
        .vazio { text-align: center; padding: 40px !important; color: var(--texto-cinza); }

        .status { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; text-transform: uppercase; }
        .status-pago { background: rgba(0, 150, 0, 0.15); color: var(--verde); border: 1px solid rgba(0, 150, 0, 0.3); }
        .status-pendente { background: rgba(255, 200, 0, 0.15); color: var(--amarelo); border: 1px solid rgba(255, 200, 0, 0.3); }
        .status-atrasado { background: rgba(220, 0, 0, 0.15); color: var(--vermelho-principal); border: 1px solid rgba(220, 0, 0, 0.3); }
        .status-gratis { background: rgba(76, 175, 80, 0.15); color: #4CAF50; border: 1px solid rgba(76, 175, 80, 0.3); }

        .btn-acao { padding: 8px 12px; border: none; border-radius: 4px; font-size: 13px; font-weight: 600; cursor: pointer; margin-right: 5px; transition: 0.2s; }
        .btn-pagar { background: var(--verde); color: white; }

        .fundo-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; padding: 20px;
        }
        .modal {
            background: var(--fundo-card); border: 1px solid var(--borda); border-radius: 10px;
            padding: 30px; width: 100%; max-width: 450px; position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
        }
        .modal h2 { color: var(--vermelho-principal); margin-bottom: 25px; font-size: 22px; font-weight: 800; }
        .fechar-modal {
            position: absolute; top: 15px; right: 15px; background: none; border: none;
            color: var(--texto-cinza); font-size: 28px; cursor: pointer; transition: 0.2s;
        }
        .fechar-modal:hover { color: var(--vermelho-principal); }

        .grupo-form { margin-bottom: 18px; }
        .grupo-form label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 600; }
        .grupo-form input {
            width: 100%; padding: 12px; background: var(--fundo-escuro); border: 1px solid var(--borda);
            border-radius: 4px; color: white; font-size: 14px;
        }
        .btn-salvar {
            width: 100%; padding: 14px; background: linear-gradient(90deg, var(--verde), #00b341);
            border: none; border-radius: 6px; color: white; font-weight: 800; font-size: 16px;
            cursor: pointer; transition: 0.2s;
        }
        .btn-salvar:hover { opacity: 0.9; transform: translateY(-1px); }

        @media (max-width: 768px) {
            .btn-menu { display: flex; align-items: center; justify-content: center; }
            .conteudo { margin-left: 0; padding: 80px 20px 20px 20px; }
            .tabela { display: block; overflow-x: auto; }
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
</head>
<body>

    <button class="btn-menu" onclick="toggleMenu()">
        <i class="fas fa-bars"></i>
    </button>

    <aside class="menu-lateral" id="menuLateral">
        <div class="logo">
            <img src="imagens/logopjj.png" alt="Logo PJJ">
            <h1>PJJ<br>Pará Jiu-Jitsu</h1>
        </div>
        <nav class="menu-navegacao">
            <ul>
                <li><a href="admin.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="alunos.html"><i class="fas fa-users"></i> Alunos</a></li>
                <li><a href="#" class="ativo"><i class="fas fa-dollar-sign"></i> Financeiro</a></li>
                <li><a href="historico-financeiro.html"><i class="fas fa-history"></i> Histórico Financeiro</a></li>
                <li><a href="relatorios.html"><i class="fas fa-file-alt"></i> Relatórios</a></li>
                <li><a href="configuracoes.html"><i class="fas fa-cog"></i> Configurações</a></li>
                <li><a href="#" style="margin-top:20px;color:#FF4D4D" onclick="sair()"><i class="fas fa-sign-out-alt"></i> Sair</a></li>
            </ul>
        </nav>
    </aside>

    <main class="conteudo">
        <div class="cabecalho">
            <h1 class="titulo-pagina">Controle Financeiro</h1>
        </div>

        <div class="card-filtro">
            <input type="text" id="busca" placeholder="🔍 Buscar por aluno ou mês...">
            <select id="filtroStatus">
                <option value="">Todos os Status</option>
                <option value="Pendente">Pendentes</option>
                <option value="Pago">Pagos</option>
                <option value="Atrasado">Atrasados</option>
                <option value="Gratuito">Gratuitos</option>
            </select>
        </div>

        <table class="tabela">
            <thead>
                <tr>
                    <th>Aluno</th>
                    <th>Tipo</th>
                    <th>Mês/Ano</th>
                    <th>Vencimento</th>
                    <th>Valor</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="listaFinanceiro">
                <tr><td colspan="7" class="vazio">Carregando dados...</td></tr>
            </tbody>
        </table>
    </main>

    <div id="modalPagamento" class="fundo-modal">
        <div class="modal">
            <button class="fechar-modal" onclick="fecharModal()">&times;</button>
            <h2>Registrar Pagamento</h2>
            <form id="formPagamento">
                <input type="hidden" id="idMensalidade">
                <div class="grupo-form">
                    <label>Aluno</label>
                    <input type="text" id="alunoPagamento" disabled>
                </div>
                <div class="grupo-form">
                    <label>Valor</label>
                    <input type="text" id="valorPagamento" disabled>
                </div>
                <div class="grupo-form">
                    <label>Data do Pagamento *</label>
                    <input type="date" id="dataPagamento" required>
                </div>
                <button type="submit" class="btn-salvar">Confirmar Pagamento</button>
            </form>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAwbIaioYPlQsHEz2bNh5ATi3cGicu12bw",
          authDomain: "pjj-para-jiu-jitsu.firebaseapp.com",
          projectId: "pjj-para-jiu-jitsu",
          storageBucket: "pjj-para-jiu-jitsu.firebasestorage.app",
          messagingSenderId: "72563195814",
          appId: "1:72563195814:web:5bc90e7bc0c51f415c1967"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function toggleMenu() {
            document.getElementById('menuLateral').classList.toggle('fechado');
        }

        async function gerarMensalidadesAutomaticas() {
            try {
                const alunosSnapshot = await db.collection('alunos').get();
                const hoje = new Date();

                for (const alunoDoc of alunosSnapshot.docs) {
                    const a = alunoDoc.data();
                    if (!a.dataPrimeiraAula || !a.periodo) continue;

                    const dataInicio = a.dataPrimeiraAula.toDate();
                    const diaVencimento = dataInicio.getDate();
                    const valor = a.valorPlano || 0;
                    const tipo = a.tipo || 'Comercial';

                    let intervaloMeses;
                    switch(a.periodo) {
                        case 'Mensal': intervaloMeses = 1; break;
                        case 'Trimestral': intervaloMeses = 3; break;
                        case 'Semestral': intervaloMeses = 6; break;
                        case 'Anual': intervaloMeses = 12; break;
                        default: intervaloMeses = 1;
                    }

                    let dataAtual = new Date(dataInicio);
                    while (dataAtual <= hoje) {
                        const mesAno = `${(dataAtual.getMonth() + 1).toString().padStart(2, '0')}/${dataAtual.getFullYear()}`;
                        const dataVencimento = new Date(dataAtual);
                        dataVencimento.setDate(diaVencimento);

                        const existe = await db.collection('mensalidades')
                            .where('alunoId', '==', alunoDoc.id)
                            .where('mesAno', '==', mesAno)
                            .limit(1).get();

                        if (existe.empty) {
                            await db.collection('mensalidades').add({
                                alunoId: alunoDoc.id,
                                alunoNome: a.nome,
                                tipoAluno: tipo,
                                mesAno: mesAno,
                                dataVencimento: firebase.firestore.Timestamp.fromDate(dataVencimento),
                                valor: valor,
                                status: valor === 0 ? 'Gratuito' : (dataVencimento < hoje ? 'Atrasado' : 'Pendente'),
                                dataPagamento: null
                            });
                        }

                        dataAtual.setMonth(dataAtual.getMonth() + intervaloMeses);
                    }
                }
            } catch (erro) {
                console.error('Erro ao gerar mensalidades:', erro);
            }
        }

        async function carregarFinanceiro() {
            const lista = document.getElementById('listaFinanceiro');
            lista.innerHTML = '<tr><td colspan="7" class="vazio">Carregando...</td></tr>';

            try {
                const snapshot = await db.collection('mensalidades').orderBy('dataVencimento', 'desc').get();
                const hoje = new Date();

                if (snapshot.empty) {
                    lista.innerHTML = '<tr><td colspan="7" class="vazio">Nenhuma mensalidade encontrada</td></tr>';
                    return;
                }

                lista.innerHTML = '';
                snapshot.forEach(doc => {
                    const m = doc.data();
                    const vencimento = m.dataVencimento.toDate();
                    let status = m.status;

                    if (status === 'Pendente' && vencimento < hoje) status = 'Atrasado';

                    const valorTexto = m.valor === 0 ? 'GRÁTIS' : `R$ ${m.valor.toFixed(2).replace('.', ',')}`;
                    const classeStatus = status === 'Pago' ? 'status-pago' : status === 'Atrasado' ? 'status-atrasado' : status === 'Gratuito' ? 'status-gratis' : 'status-pendente';

                    const acao = status === 'Pendente' ? `<button class="btn-acao btn-pagar" onclick="abrirModalPagamento('${doc.id}', '${m.alunoNome}', ${m.valor})">Pagar</button>` : '-';

                    const linha = `
                    <tr>
                        <td><strong>${m.alunoNome}</strong></td>
                        <td>${m.tipoAluno}</td>
                        <td>${m.mesAno}</td>
                        <td>${vencimento.toLocaleDateString('pt-BR')}</td>
                        <td>${valorTexto}</td>
                        <td><span class="status ${classeStatus}">${status}</span></td>
                        <td>${acao}</td>
                    </tr>`;
                    lista.innerHTML += linha;
                });

            } catch (erro) {
                console.error('Erro ao carregar financeiro:', erro);
                lista.innerHTML = '<tr><td colspan="7" class="vazio">Erro ao carregar dados</td></tr>';
            }
        }

        function abrirModalPagamento(id, nome, valor) {
            document.getElementById('idMensalidade').value = id;
            document.getElementById('alunoPagamento').value = nome;
            document.getElementById('valorPagamento').value = valor === 0 ? 'GRÁTIS' : `R$ ${valor.toFixed(2).replace('.', ',')}`;
            document.getElementById('dataPagamento').valueAsDate = new Date();
            document.getElementById('modalPagamento').style.display = 'flex';
        }

        function fecharModal() {
            document.getElementById('modalPagamento').style.display = 'none';
        }

        document.getElementById('formPagamento').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('idMensalidade').value;
            const dataPagamento = document.getElementById('dataPagamento').value;

            try {
                await db.collection('mensalidades').doc(id).update({
                    status: 'Pago',
                    dataPagamento: firebase.firestore.Timestamp.fromDate(new Date(dataPagamento))
                });
                alert('Pagamento registrado com sucesso!');
                fecharModal();
                carregarFinanceiro();
            } catch (erro) {
                console.error('Erro:', erro);
                alert('Erro ao registrar pagamento');
            }
        });

        function sair() {
            if (confirm('Deseja sair do sistema?')) {
                auth.signOut().then(() => window.location.href = 'login.html');
            }
        }

        document.getElementById('busca').addEventListener('input', () => {
            const termo = document.getElementById('busca').value.toLowerCase();
            document.querySelectorAll('#listaFinanceiro tr').forEach(linha => {
                linha.style.display = linha.textContent.toLowerCase().includes(termo) ? '' : 'none';
            });
        });

        document.getElementById('filtroStatus').addEventListener('change', () => {
            const status = document.getElementById('filtroStatus').value.toLowerCase();
            document.querySelectorAll('#listaFinanceiro tr').forEach(linha => {
                linha.style.display = !status || linha.textContent.toLowerCase().includes(status) ? '' : 'none';
            });
        });

        auth.onAuthStateChanged(usuario => {
            if (!usuario) {
                window.location.href = 'login.html';
            } else {
                gerarMensalidadesAutomaticas().then(() => carregarFinanceiro());
            }
        });
    </script>
</body>
</html>
