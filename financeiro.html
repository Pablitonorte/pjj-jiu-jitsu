<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financeiro - PJJ Pará Jiu-Jitsu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        :root {
            --fundo-escuro: #121214; --fundo-card: #1A1A1F; --vermelho-principal: #D10000;
            --vermelho-claro: #FF3B3B; --texto-branco: #FFFFFF; --texto-cinza: #B0B0B8; --borda: #29292E;
            --verde: #00C853; --amarelo: #FFC107; --azul: #2563eb; --cinza: #6B7280;
        }

        html, body { 
            background: var(--fundo-escuro); 
            color: var(--texto-branco); 
            min-height: 100vh; 
            overflow-y: auto;
        }

        .btn-menu {
            display: none; position: fixed; top: 15px; left: 15px; z-index: 9999;
            background: var(--vermelho-principal); border: none; color: white;
            width: 48px; height: 48px; border-radius: 8px; font-size: 22px; cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .menu-lateral {
            width: 240px; background: var(--fundo-escuro); border-right: 1px solid var(--borda);
            padding: 30px 0; position: fixed; height: 100vh; top: 0; left: 0; z-index: 999;
            transition: transform 0.3s ease; overflow-y: auto;
        }
        .menu-lateral.aberto { transform: translateX(0); }
        .menu-lateral.fechado { transform: translateX(-100%); }

        .logo { text-align: center; margin-bottom: 40px; }
        .logo img { width: 90px; margin-bottom: 10px; }
        .logo h1 { font-size: 14px; font-weight: 700; line-height: 1.3; }

        .menu-navegacao ul { list-style: none; padding: 0 15px; }
        .menu-navegacao li a {
            display: flex; align-items: center; gap: 10px; padding: 12px 15px; margin-bottom: 5px;
            color: var(--texto-cinza); text-decoration: none; font-size: 14px; font-weight: 600; border-radius: 6px; transition: 0.2s;
        }
        .menu-navegacao li a.ativo, .menu-navegacao li a:hover { background: rgba(209,0,0,0.15); color: var(--vermelho-principal); }

        .conteudo { 
            margin-left: 240px; 
            padding: 35px 45px; 
            min-height: 100vh;
            width: calc(100% - 240px);
        }

        .cabecalho {
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 25px;
        }
        .titulo-pagina { font-size: 26px; font-weight: 800; position: relative; }
        .titulo-pagina::after { content: ''; position: absolute; bottom: -8px; left: 0; width: 70px; height: 3px; background: var(--vermelho-principal); }

        .card-form { background: var(--fundo-card); border: 1px solid var(--borda); border-radius: 10px; padding: 25px; margin-bottom: 30px; }
        .card-form h3 { margin-bottom: 20px; color: var(--texto-branco); font-size: 18px; }

        .linha { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 18px; }
        .campo { display: flex; flex-direction: column; }
        .campo label { margin-bottom: 8px; font-size: 14px; font-weight: 600; }
        .campo input, .campo select {
            padding: 12px; background: var(--fundo-escuro); border: 1px solid var(--borda);
            border-radius: 6px; color: white; font-size: 14px; outline: none;
        }
        .campo input:disabled, .campo select:disabled { opacity: 0.7; cursor: not-allowed; }
        .campo input:focus, .campo select:focus { border-color: var(--vermelho-principal); }

        .btn-salvar {
            background: var(--verde); color: white; border: none; padding: 12px 20px;
            border-radius: 6px; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .btn-salvar:hover { background: #00b348; }

        .card-filtro { background: var(--fundo-card); border: 1px solid var(--borda); border-radius: 10px; padding: 20px; margin-bottom: 25px; display: flex; gap: 15px; flex-wrap: wrap; align-items: center; }
        .card-filtro input, .card-filtro select {
            padding: 10px; background: var(--fundo-escuro); border: 1px solid var(--borda);
            border-radius: 6px; color: white; font-size: 14px;
        }

        .tabela { width: 100%; border-collapse: collapse; background: var(--fundo-card); border: 1px solid var(--borda); border-radius: 10px; overflow: hidden; }
        .tabela th { background: #1f1f25; padding: 15px; text-align: left; font-size: 13px; font-weight: 700; color: var(--texto-cinza); text-transform: uppercase; }
        .tabela td { padding: 15px; border-bottom: 1px solid var(--borda); font-size: 14px; }
        .tabela tr:hover { background: rgba(255,255,255,0.03); }
        .vazio { text-align: center; padding: 40px !important; color: var(--texto-cinza); }

        .status-pago { color: var(--verde); font-weight: 600; }
        .status-pendente { color: var(--amarelo); font-weight: 600; }
        .btn-acao { padding: 6px 10px; border: none; border-radius: 4px; font-size: 12px; font-weight: 600; cursor: pointer; margin-right: 5px; }
        .btn-pago { background: var(--verde); color: white; }
        .btn-editar { background: var(--azul); color: white; }
        .btn-excluir { background: var(--vermelho-principal); color: white; }

        @media (max-width: 992px) {
            .conteudo { margin-left: 0; width: 100%; padding: 80px 20px 20px; }
            .btn-menu { display: flex; align-items: center; justify-content: center; }
            .menu-lateral { transform: translateX(-100%); }
            .menu-lateral.aberto { transform: translateX(0); }
        }

        @media (max-width: 600px) {
            .tabela { display: block; overflow-x: auto; }
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
</head>
<body>

    <button class="btn-menu" onclick="abrirFecharMenu()">
        <i class="fas fa-bars"></i>
    </button>

    <aside class="menu-lateral" id="menuLateral">
        <div class="logo">
            <img src="imagens/logopjj.png" alt="Logo PJJ">
            <h1>PJJ<br>Pará Jiu-Jitsu</h1>
        </div>
        <nav class="menu-navegacao">
            <ul>
                <li><a href="admin.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="alunos.html"><i class="fas fa-users"></i> Alunos</a></li>
                <li><a href="#" class="ativo"><i class="fas fa-dollar-sign"></i> Financeiro</a></li>
                <li><a href="declaracao.html"><i class="fas fa-file-alt"></i> Declaração</a></li>
                <li><a href="relatorios.html"><i class="fas fa-chart-bar"></i> Relatórios</a></li>
                <li><a href="configuracoes.html"><i class="fas fa-cog"></i> Configurações</a></li>
                <li><a href="#" style="margin-top:20px;color:#FF4D4D" onclick="sair()"><i class="fas fa-sign-out-alt"></i> Sair</a></li>
            </ul>
        </nav>
    </aside>

    <main class="conteudo">
        <div class="cabecalho">
            <h1 class="titulo-pagina">Financeiro e Histórico</h1>
        </div>

        <!-- Formulário de Lançamento -->
        <div class="card-form">
            <h3>Novo Lançamento</h3>
            <form id="formLancamento">
                <input type="hidden" id="idLancamento" value="">
                <div class="linha">
                    <div class="campo">
                        <label>Aluno *</label>
                        <select id="alunoLancamento" required onchange="carregarDadosAluno()">
                            <option value="">Selecione um aluno</option>
                        </select>
                    </div>
                    <div class="campo">
                        <label>Plano do Aluno</label>
                        <input type="text" id="planoAluno" readonly placeholder="Carregando...">
                    </div>
                    <div class="campo">
                        <label>Valor do Plano (R$)</label>
                        <input type="number" step="0.01" min="0" id="valorLancamento" readonly placeholder="Valor automático">
                    </div>
                    <div class="campo">
                        <label>Data de Início / Vencimento</label>
                        <input type="date" id="dataLancamento" readonly placeholder="Data da aula">
                    </div>
                    <div class="campo">
                        <label>Status *</label>
                        <select id="statusLancamento" required>
                            <option value="Pendente">Pendente</option>
                            <option value="Pago">Pago</option>
                        </select>
                    </div>
                </div>
                <div class="linha">
                    <div class="campo" style="grid-column: 1 / -1;">
                        <label>Observação</label>
                        <input type="text" id="obsLancamento" placeholder="Ex: Mensalidade referente ao mês">
                    </div>
                </div>
                <button type="submit" class="btn-salvar">Salvar Lançamento</button>
            </form>
        </div>

        <!-- Filtros do Histórico -->
        <div class="card-filtro">
            <input type="text" id="buscaHistorico" placeholder="🔍 Buscar por aluno...">
            <select id="filtroStatus">
                <option value="">Todos os status</option>
                <option value="Pago">Pago</option>
                <option value="Pendente">Pendente</option>
            </select>
            <input type="date" id="filtroDataInicio">
            <input type="date" id="filtroDataFim">
        </div>

        <!-- Tabela com Histórico -->
        <table class="tabela">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Aluno</th>
                    <th>Plano</th>
                    <th>Valor</th>
                    <th>Status</th>
                    <th>Observação</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="listaHistorico">
                <tr><td colspan="7" class="vazio">Carregando lançamentos...</td></tr>
            </tbody>
        </table>
    </main>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAwbIaioYPlQsHEz2bNh5ATi3cGicu12bw",
          authDomain: "pjj-para-jiu-jitsu.firebaseapp.com",
          projectId: "pjj-para-jiu-jitsu",
          storageBucket: "pjj-para-jiu-jitsu.firebasestorage.app",
          messagingSenderId: "72563195814",
          appId: "1:72563195814:web:5bc90e7bc0c51f415c1967"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function abrirFecharMenu() {
            document.getElementById('menuLateral').classList.toggle('aberto');
        }

        // ✅ CORRIGIDO: Busca os campos corretos do cadastro do aluno
        async function carregarDadosAluno() {
            const alunoId = document.getElementById('alunoLancamento').value;
            if (!alunoId) {
                document.getElementById('planoAluno').value = '';
                document.getElementById('valorLancamento').value = '';
                document.getElementById('dataLancamento').value = '';
                return;
            }
            try {
                const alunoSnap = await db.collection('alunos').doc(alunoId).get();
                if (alunoSnap.exists) {
                    const dados = alunoSnap.data();
                    
                    // Busca o nome do plano (tenta os nomes mais comuns)
                    const nomePlano = dados.plano || dados.tipoPlano || dados.categoria || 'Não informado';
                    document.getElementById('planoAluno').value = nomePlano;
                    
                    // Busca o valor do plano
                    const valorPlano = dados.valor || dados.valorPlano || dados.mensalidade || 0;
                    document.getElementById('valorLancamento').value = valorPlano;
                    
                    // Busca a data de início
                    if (dados.dataInicio) {
                        const data = dados.dataInicio.toDate ? dados.dataInicio.toDate() : new Date(dados.dataInicio);
                        document.getElementById('dataLancamento').value = data.toISOString().split('T')[0];
                    } else {
                        document.getElementById('dataLancamento').value = '';
                    }
                }
            } catch (erro) {
                console.error('Erro ao carregar dados do aluno:', erro);
                document.getElementById('planoAluno').value = 'Erro';
            }
        }

        // Carrega lista de alunos
        async function carregarAlunosSelect() {
            const select = document.getElementById('alunoLancamento');
            select.innerHTML = '<option value="">Selecione um aluno</option>';
            try {
                const snapshot = await db.collection('alunos').orderBy('nome', 'asc').get();
                snapshot.forEach(doc => {
                    const aluno = doc.data();
                    select.innerHTML += `<option value="${doc.id}">${aluno.nome || 'Sem nome'}</option>`;
                });
            } catch (erro) {
                console.error('Erro ao carregar alunos:', erro);
                select.innerHTML = '<option value="">Erro ao carregar</option>';
            }
        }

        // Marcar como pago / pendente
        async function marcarComoPago(id, statusAtual) {
            const novoStatus = statusAtual === 'Pago' ? 'Pendente' : 'Pago';
            try {
                await db.collection('lancamentos').doc(id).update({ status: novoStatus });
                carregarHistorico();
            } catch (erro) {
                alert('Erro ao alterar status: ' + erro.message);
            }
        }

        // Carrega histórico de lançamentos
        async function carregarHistorico() {
            const lista = document.getElementById('listaHistorico');
            lista.innerHTML = '<tr><td colspan="7" class="vazio">Carregando lançamentos...</td></tr>';
            try {
                const snapshot = await db.collection('lancamentos').orderBy('data', 'desc').get();
                if (snapshot.empty) {
                    lista.innerHTML = '<tr><td colspan="7" class="vazio">Nenhum lançamento cadastrado</td></tr>';
                    return;
                }
                lista.innerHTML = '';
                for (const doc of snapshot.docs) {
                    const dados = doc.data();
                    const alunoRef = dados.alunoId ? await db.collection('alunos').doc(dados.alunoId).get() : null;
                    const nomeAluno = alunoRef?.exists ? alunoRef.data().nome : 'Aluno não encontrado';
                    const planoAluno = alunoRef?.exists ? (alunoRef.data().plano || alunoRef.data().tipoPlano || '-') : '-';
                    const dataFormatada = dados.data ? dados.data.toDate().toLocaleDateString('pt-BR') : '-';
                    const valorFormatado = `R$ ${(dados.valor || 0).toFixed(2).replace('.', ',')}`;
                    const classeStatus = dados.status === 'Pago' ? 'status-pago' : 'status-pendente';

                    const linha = `
                    <tr>
                        <td>${dataFormatada}</td>
                        <td>${nomeAluno}</td>
                        <td>${planoAluno}</td>
                        <td>${valorFormatado}</td>
                        <td><span class="${classeStatus}">${dados.status || '-'}</span></td>
                        <td>${dados.observacao || '-'}</td>
                        <td>
                            <button class="btn-acao btn-pago" onclick="marcarComoPago('${doc.id}', '${dados.status}')">
                                ${dados.status === 'Pago' ? 'Desmarcar' : 'Marcar Pago'}
                            </button>
                            <button class="btn-acao btn-editar" onclick="editarLancamento('${doc.id}')">Editar</button>
                            <button class="btn-acao btn-excluir" onclick="excluirLancamento('${doc.id}')">Excluir</button>
                        </td>
                    </tr>`;
                    lista.innerHTML += linha;
                }
            } catch (erro) {
                console.error('Erro ao carregar histórico:', erro);
                lista.innerHTML = `<tr><td colspan="7" class="vazio">Erro: ${erro.message}</td></tr>`;
            }
        }

        // Salva lançamento
        document.getElementById('formLancamento').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('idLancamento').value;
            const dados = {
                alunoId: document.getElementById('alunoLancamento').value,
                plano: document.getElementById('planoAluno').value,
                valor: parseFloat(document.getElementById('valorLancamento').value) || 0,
                data: firebase.firestore.Timestamp.fromDate(new Date(document.getElementById('dataLancamento').value)),
                status: document.getElementById('statusLancamento').value,
                observacao: document.getElementById('obsLancamento').value.trim(),
                dataCadastro: firebase.firestore.Timestamp.now()
            };
            try {
                if (id) {
                    await db.collection('lancamentos').doc(id).update(dados);
                    alert('Lançamento atualizado com sucesso!');
                } else {
                    await db.collection('lancamentos').add(dados);
                    alert('Lançamento cadastrado com sucesso!');
                }
                document.getElementById('formLancamento').reset();
                document.getElementById('idLancamento').value = '';
                carregarHistorico();
            } catch (erro) {
                console.error('Erro ao salvar:', erro);
                alert('Erro: ' + erro.message);
            }
        });

        function editarLancamento(id) {
            alert('Selecione o aluno novamente para carregar os dados do plano');
        }

        async function excluirLancamento(id) {
            if (!confirm('Deseja excluir este lançamento?')) return;
            try {
                await db.collection('lancamentos').doc(id).delete();
                carregarHistorico();
            } catch (erro) {
                console.error('Erro ao excluir:', erro);
                alert('Erro: ' + erro.message);
            }
        }

        // Filtros
        document.getElementById('buscaHistorico').addEventListener('input', () => {
            const termo = document.getElementById('buscaHistorico').value.toLowerCase();
            document.querySelectorAll('#listaHistorico tr').forEach(linha => {
                linha.style.display = linha.textContent.toLowerCase().includes(termo) ? '' : 'none';
            });
        });

        // Inicializa
        auth.onAuthStateChanged(usuario => {
            if (!usuario) {
                window.location.href = 'login.html';
            } else {
                carregarAlunosSelect();
                carregarHistorico();
            }
        });

        function sair() {
            if (confirm('Deseja sair?')) {
                auth.signOut().then(() => window.location.href = 'login.html');
            }
        }
    </script>
</body>
</html>
