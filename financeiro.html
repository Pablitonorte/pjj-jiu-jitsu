<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financeiro - PJJ Pará Jiu-Jitsu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

        :root {
            --vermelho-principal: #D10000;
            --vermelho-claro: #FF3B3B;
            --verde: #00C853;
            --amarelo: #FFC107;
            --azul: #2563eb;
            --cinza: #6B7280;
            --vermelho-atraso: #ff4444;
        }

        .tema-escuro {
            --fundo-escuro: #121214;
            --fundo-card: #1A1A1F;
            --texto-branco: #FFFFFF;
            --texto-cinza: #B0B0B8;
            --borda: #29292E;
            --fundo-input: #0C0C0E;
            --fundo-modal: rgba(0,0,0,0.8);
        }

        .tema-claro {
            --fundo-escuro: #F8F9FA;
            --fundo-card: #FFFFFF;
            --texto-branco: #121214;
            --texto-cinza: #6B7280;
            --borda: #DEE2E6;
            --fundo-input: #FFFFFF;
            --fundo-modal: rgba(0,0,0,0.5);
        }

        html, body { 
            background: var(--fundo-escuro); 
            color: var(--texto-branco); 
            min-height: 100vh; 
            overflow-y: auto;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .btn-menu {
            display: none; position: fixed; top: 15px; left: 15px; z-index: 9999;
            background: var(--vermelho-principal); border: none; color: white;
            width: 48px; height: 48px; border-radius: 8px; font-size: 22px; cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .menu-lateral {
            width: 240px; background: var(--fundo-card); border-right: 1px solid var(--borda);
            padding: 30px 0; position: fixed; height: 100vh; top: 0; left: 0; z-index: 999;
            transition: transform 0.3s ease; overflow-y: auto;
        }
        .menu-lateral.aberto { transform: translateX(0); }
        .menu-lateral.fechado { transform: translateX(-100%); }

        .logo { text-align: center; margin-bottom: 40px; }
        .logo img { width: 90px; margin-bottom: 10px; }
        .logo h1 { font-size: 14px; font-weight: 700; line-height: 1.3; }

        .menu-navegacao ul { list-style: none; padding: 0 15px; }
        .menu-navegacao li a {
            display: flex; align-items: center; gap: 10px; padding: 12px 15px; margin-bottom: 5px;
            color: var(--texto-cinza); text-decoration: none; font-size: 14px; font-weight: 600; border-radius: 6px; transition: 0.2s;
        }
        .menu-navegacao li a.ativo, .menu-navegacao li a:hover { background: rgba(209,0,0,0.15); color: var(--vermelho-principal); }

        .conteudo { 
            margin-left: 240px; 
            padding: 35px 45px; 
            min-height: 100vh;
            width: calc(100% - 240px);
        }

        .cabecalho {
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 25px;
        }
        .titulo-pagina { font-size: 26px; font-weight: 800; position: relative; }
        .titulo-pagina::after { content: ''; position: absolute; bottom: -8px; left: 0; width: 70px; height: 3px; background: var(--vermelho-principal); }

        .card-filtro { background: var(--fundo-card); border: 1px solid var(--borda); border-radius: 10px; padding: 20px; margin-bottom: 25px; display: flex; gap: 15px; flex-wrap: wrap; align-items: center; }
        .card-filtro input, .card-filtro select {
            padding: 10px; background: var(--fundo-input); border: 1px solid var(--borda);
            border-radius: 6px; color: var(--texto-branco); font-size: 14px;
        }

        .tabela { width: 100%; border-collapse: collapse; background: var(--fundo-card); border: 1px solid var(--borda); border-radius: 10px; overflow: hidden; }
        .tabela th { background: rgba(255,255,255,0.05); padding: 15px; text-align: left; font-size: 13px; font-weight: 700; color: var(--texto-cinza); text-transform: uppercase; }
        .tabela td { padding: 15px; border-bottom: 1px solid var(--borda); font-size: 14px; }
        .tabela tr:hover { background: rgba(255,255,255,0.03); }
        .vazio { text-align: center; padding: 40px !important; color: var(--texto-cinza); }

        .status-pago { color: var(--verde); font-weight: 600; }
        .status-pendente { color: var(--amarelo); font-weight: 600; }
        .status-atrasado { color: var(--vermelho-atraso); font-weight: 700; }

        .btn-acao { padding: 8px 12px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-pago { background: var(--verde); color: white; }
        .btn-pago:hover { background: #00E05C; }
        .btn-pendente { background: var(--amarelo); color: #111; }
        .btn-pendente:hover { background: #FFD54F; }
        .btn-atrasado { background: var(--vermelho-atraso); color: white; }
        .btn-atrasado:hover { background: #FF6666; }

        /* 📅 MODAL PARA ESCOLHER O MÊS */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--fundo-modal); z-index: 10000; align-items: center; justify-content: center;
        }
        .modal.aberto { display: flex; }
        .modal-conteudo {
            background: var(--fundo-card); border: 1px solid var(--borda); border-radius: 12px;
            padding: 30px; width: 90%; max-width: 450px;
        }
        .modal-titulo { font-size: 20px; font-weight: 700; margin-bottom: 20px; text-align: center; }
        .modal-grupo { margin-bottom: 15px; }
        .modal-grupo label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 500; }
        .modal-grupo select {
            width: 100%; padding: 12px; background: var(--fundo-input); border: 1px solid var(--borda);
            border-radius: 6px; color: var(--texto-branco); font-size: 15px;
        }
        .modal-botoes { display: flex; gap: 10px; justify-content: flex-end; margin-top: 25px; }
        .btn-cancelar { background: var(--cinza); color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .btn-confirmar { background: var(--verde); color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }

        @media (max-width: 992px) {
            .conteudo { margin-left: 0; width: 100%; padding: 80px 20px 20px; }
            .btn-menu { display: flex; align-items: center; justify-content: center; }
            .menu-lateral { transform: translateX(-100%); }
            .menu-lateral.aberto { transform: translateX(0); }
        }

        @media (max-width: 600px) {
            .tabela { display: block; overflow-x: auto; }
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
</head>
<body class="tema-escuro">

    <button class="btn-menu" onclick="abrirFecharMenu()">
        <i class="fas fa-bars"></i>
    </button>

    <aside class="menu-lateral" id="menuLateral">
        <div class="logo">
            <img src="imagens/logopjj.png" alt="Logo PJJ">
            <h1>PJJ<br>Pará Jiu-Jitsu</h1>
        </div>
        <nav class="menu-navegacao">
            <ul>
                <li><a href="admin.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="alunos.html"><i class="fas fa-users"></i> Alunos</a></li>
                <li><a href="#" class="ativo"><i class="fas fa-dollar-sign"></i> Financeiro</a></li>
                <li><a href="declaracao.html"><i class="fas fa-file-alt"></i> Declaração</a></li>
                <li><a href="relatorios.html"><i class="fas fa-chart-bar"></i> Relatórios</a></li>
                <li><a href="configuracoes.html"><i class="fas fa-cog"></i> Configurações</a></li>
                <li><a href="#" style="margin-top:20px;color:#FF4D4D" onclick="sair()"><i class="fas fa-sign-out-alt"></i> Sair</a></li>
            </ul>
        </nav>
    </aside>

    <main class="conteudo">
        <div class="cabecalho">
            <h1 class="titulo-pagina">Controle Financeiro</h1>
        </div>

        <div class="card-filtro">
            <input type="text" id="busca" placeholder="🔍 Buscar por nome...">
            <select id="filtroStatus">
                <option value="">Todos os status</option>
                <option value="Pago">Pago</option>
                <option value="Pendente">Pendente</option>
                <option value="Atrasado">Atrasado</option>
            </select>
        </div>

        <table class="tabela">
            <thead>
                <tr>
                    <th>Nome do Aluno</th>
                    <th>Tipo de Aluno</th>
                    <th>Valor Mensal</th>
                    <th>Último Pagamento</th>
                    <th>Status Atual</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="listaAlunos">
                <tr><td colspan="6" class="vazio">Carregando dados...</td></tr>
            </tbody>
        </table>
    </main>

    <!-- 📅 MODAL PARA ESCOLHER O MÊS DO PAGAMENTO -->
    <div class="modal" id="modalMes">
        <div class="modal-conteudo">
            <h3 class="modal-titulo">Marcar Pagamento do Mês</h3>
            <div class="modal-grupo">
                <label>Aluno:</label>
                <span id="nomeAlunoModal" style="font-weight:600; font-size:15px;"></span>
            </div>
            <div class="modal-grupo">
                <label>Selecione o Mês e Ano:</label>
                <select id="mesPagamento">
                    <option value="01/2025">Janeiro/2025</option>
                    <option value="02/2025">Fevereiro/2025</option>
                    <option value="03/2025">Março/2025</option>
                    <option value="04/2025">Abril/2025</option>
                    <option value="05/2025">Maio/2025</option>
                    <option value="06/2025">Junho/2025</option>
                    <option value="07/2025">Julho/2025</option>
                    <option value="08/2025">Agosto/2025</option>
                    <option value="09/2025">Setembro/2025</option>
                    <option value="10/2025">Outubro/2025</option>
                    <option value="11/2025">Novembro/2025</option>
                    <option value="12/2025">Dezembro/2025</option>
                    <option value="01/2026">Janeiro/2026</option>
                    <option value="02/2026">Fevereiro/2026</option>
                    <option value="03/2026">Março/2026</option>
                    <option value="04/2026">Abril/2026</option>
                    <option value="05/2026">Maio/2026</option>
                    <option value="06/2026">Junho/2026</option>
                    <option value="07/2026">Julho/2026</option>
                    <option value="08/2026">Agosto/2026</option>
                    <option value="09/2026">Setembro/2026</option>
                    <option value="10/2026">Outubro/2026</option>
                    <option value="11/2026">Novembro/2026</option>
                    <option value="12/2026">Dezembro/2026</option>
                    <option value="01/2027">Janeiro/2027</option>
                    <option value="02/2027">Fevereiro/2027</option>
                    <option value="03/2027">Março/2027</option>
                </select>
            </div>
            <div class="modal-botoes">
                <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
                <button class="btn-confirmar" onclick="confirmarPagamento()">Confirmar Pagamento</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAwbIaioYPlQsHEz2bNh5ATi3cGicu12bw",
          authDomain: "pjj-para-jiu-jitsu.firebaseapp.com",
          projectId: "pjj-para-jiu-jitsu",
          storageBucket: "pjj-para-jiu-jitsu.firebasestorage.app",
          messagingSenderId: "72563195814",
          appId: "1:72563195814:web:5bc90e7bc0c51f415c1967"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let alunoSelecionado = null;

        function carregarTema() {
            const temaSalvo = localStorage.getItem('tema') || 'escuro';
            const corpo = document.body;
            if (temaSalvo === 'claro') {
                corpo.classList.remove('tema-escuro');
                corpo.classList.add('tema-claro');
            } else {
                corpo.classList.remove('tema-claro');
                corpo.classList.add('tema-escuro');
            }
        }

        function abrirFecharMenu() {
            document.getElementById('menuLateral').classList.toggle('aberto');
        }

        // 📌 Verifica o status do aluno com base nos meses pagos
        function verificarStatusAluno(mesesPagos) {
            if (!mesesPagos || mesesPagos.length === 0) return { texto: 'Sem pagamentos', classe: 'status-atrasado' };

            const hoje = new Date();
            const mesAtual = String(hoje.getMonth() + 1).padStart(2, '0');
            const anoAtual = hoje.getFullYear();
            const dataAtual = `${mesAtual}/${anoAtual}`;

            // Converte os meses pagos para datas e ordena
            const datasPagas = mesesPagos.map(mes => {
                const [m, a] = mes.split('/');
                return new Date(a, m - 1, 1);
            }).sort((a, b) => b - a);

            const ultimoPagamento = datasPagas[0];
            const ultimoMesAno = `${String(ultimoPagamento.getMonth() + 1).padStart(2, '0')}/${ultimoPagamento.getFullYear()}`;

            // Verifica se tem meses atrasados
            let temAtrasado = false;
            for (let i = 0; i < mesesPagos.length; i++) {
                const [m, a] = mesesPagos[i].split('/');
                const dataMes = new Date(a, m - 1, 1);
                if (dataMes < new Date(anoAtual, mesAtual - 1, 1) && !mesesPagos.includes(`${String(dataMes.getMonth() + 1).padStart(2, '0')}/${dataMes.getFullYear()}`)) {
                    temAtrasado = true;
                    break;
                }
            }

            // Se o mês atual não foi pago e tem meses anteriores não pagos = Atrasado
            if (!mesesPagos.includes(dataAtual) && temAtrasado) {
                return { texto: 'Atrasado', classe: 'status-atrasado', ultimo: ultimoMesAno };
            }
            // Se o mês atual foi pago = Pago
            else if (mesesPagos.includes(dataAtual)) {
                return { texto: 'Em dia', classe: 'status-pago', ultimo: ultimoMesAno };
            }
            // Se só falta o mês atual = Pendente
            else {
                return { texto: 'Pendente', classe: 'status-pendente', ultimo: ultimoMesAno };
            }
        }

        async function carregarLista() {
            const lista = document.getElementById('listaAlunos');
            lista.innerHTML = '<tr><td colspan="6" class="vazio">Carregando dados...</td></tr>';

            try {
                const snapshot = await db.collection('alunos').get();
                if (snapshot.empty) {
                    lista.innerHTML = '<tr><td colspan="6" class="vazio">Nenhum aluno cadastrado</td></tr>';
                    return;
                }

                const alunos = [];
                snapshot.forEach(doc => alunos.push({ id: doc.id, dados: doc.data() }));

                // Ordena por status: Atrasado primeiro, depois Pendente, depois Pago
                alunos.sort((a, b) => {
                    const statusA = verificarStatusAluno(a.dados.mesesPagos || []);
                    const statusB = verificarStatusAluno(b.dados.mesesPagos || []);
                    const ordem = { 'status-atrasado': 0, 'status-pendente': 1, 'status-pago': 2 };
                    return ordem[statusA.classe] - ordem[statusB.classe];
                });

                lista.innerHTML = '';

                for (const aluno of alunos) {
                    const dados = aluno.dados;
                    const alunoId = aluno.id;

                    const nome = dados.nome || '-';
                    const tipoAluno = dados.tipoAluno || '-';
                    const valor = dados.valor || dados.valorPlano || dados.mensalidade || 0;
                    const mesesPagos = dados.mesesPagos || [];
                    const status = verificarStatusAluno(mesesPagos);

                    const linha = `
                    <tr>
                        <td>${nome}</td>
                        <td>${tipoAluno}</td>
                        <td>R$ ${valor.toFixed(2).replace('.', ',')}</td>
                        <td>${status.ultimo || 'Nenhum'}</td>
                        <td><span class="${status.classe}">${status.texto}</span></td>
                        <td>
                            <button class="btn-acao btn-pago" onclick="abrirModalPagamento('${alunoId}', '${nome}')">
                                Marcar Mês Pago
                            </button>
                        </td>
                    </tr>`;
                    lista.innerHTML += linha;
                }

            } catch (erro) {
                console.error('Erro ao carregar:', erro);
                lista.innerHTML = `<tr><td colspan="6" class="vazio">Erro: ${erro.message}</td></tr>`;
            }
        }

        // 📅 Abre o modal para escolher o mês
        function abrirModalPagamento(id, nome) {
            alunoSelecionado = id;
            document.getElementById('nomeAlunoModal').textContent = nome;
            document.getElementById('modalMes').classList.add('aberto');
        }

        function fecharModal() {
            document.getElementById('modalMes').classList.remove('aberto');
            alunoSelecionado = null;
        }

        // ✅ Confirma e salva o mês como pago
        async function confirmarPagamento() {
            if (!alunoSelecionado) return;

            const mesEscolhido = document.getElementById('mesPagamento').value;

            try {
                const alunoRef = db.collection('alunos').doc(alunoSelecionado);
                const alunoAtual = await alunoRef.get();
                const mesesPagos = alunoAtual.data().mesesPagos || [];

                // Adiciona só se ainda não estiver pago
                if (!mesesPagos.includes(mesEscolhido)) {
                    mesesPagos.push(mesEscolhido);
                    await alunoRef.update({ mesesPagos: mesesPagos });
                    alert(`Mês ${mesEscolhido} marcado como PAGO com sucesso!`);
                } else {
                    alert(`Esse mês já está marcado como pago para esse aluno!`);
                }

                fecharModal();
                carregarLista();
            } catch (erro) {
                alert('Erro ao marcar pagamento: ' + erro.message);
            }
        }

        // Filtros
        document.getElementById('busca').addEventListener('input', () => {
            const termo = document.getElementById('busca').value.toLowerCase().trim();
            document.querySelectorAll('#listaAlunos tr').forEach(linha => {
                if (linha.classList.contains('vazio')) return;
                linha.style.display = linha.textContent.toLowerCase().includes(termo) ? '' : 'none';
            });
        });

        document.getElementById('filtroStatus').addEventListener('change', () => {
            const filtro = document.getElementById('filtroStatus').value;
            document.querySelectorAll('#listaAlunos tr').forEach(linha => {
                if (linha.classList.contains('vazio')) return;
                const statusTexto = linha.querySelector('span').textContent;
                linha.style.display = !filtro ? '' : (statusTexto.includes(filtro) ? '' : 'none');
            });
        });

        auth.onAuthStateChanged(usuario => {
            if (!usuario) window.location.href = 'login.html';
            else { carregarTema(); carregarLista(); }
        });

        function sair() {
            if (confirm('Deseja sair do sistema?')) {
                auth.signOut().then(() => window.location.href = 'login.html');
            }
        }
    </script>
</body>
</html>
