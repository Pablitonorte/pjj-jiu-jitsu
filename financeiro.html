<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financeiro - PJJ Pará Jiu-Jitsu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

        :root {
            --vermelho-principal: #D10000;
            --vermelho-claro: #FF3B3B;
            --verde: #00C853;
            --amarelo: #FFC107;
            --cinza: #6B7280;
            --vermelho-atraso: #ff4444;
            --azul-info: #3b82f6;
        }

        .tema-escuro {
            --fundo-escuro: #121214;
            --fundo-card: #1A1A1F;
            --texto-branco: #FFFFFF;
            --texto-cinza: #B0B0B8;
            --borda: #29292E;
            --fundo-input: #0C0C0E;
            --fundo-modal: rgba(0,0,0,0.8);
        }

        .tema-claro {
            --fundo-escuro: #F8F9FA;
            --fundo-card: #FFFFFF;
            --texto-branco: #121214;
            --texto-cinza: #6B7280;
            --borda: #DEE2E6;
            --fundo-input: #FFFFFF;
            --fundo-modal: rgba(0,0,0,0.5);
        }

        html, body { 
            background: var(--fundo-escuro); 
            color: var(--texto-branco); 
            min-height: 100vh; 
            overflow-y: auto;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .btn-menu {
            display: none; position: fixed; top: 15px; left: 15px; z-index: 9999;
            background: var(--vermelho-principal); border: none; color: white;
            width: 48px; height: 48px; border-radius: 8px; font-size: 22px; cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .menu-lateral {
            width: 240px; background: var(--fundo-card); border-right: 1px solid var(--borda);
            padding: 30px 0; position: fixed; height: 100vh; top: 0; left: 0; z-index: 999;
            transition: transform 0.3s ease; overflow-y: auto;
        }
        .menu-lateral.aberto { transform: translateX(0); }
        .menu-lateral.fechado { transform: translateX(-100%); }

        .logo { text-align: center; margin-bottom: 40px; }
        .logo img { width: 90px; margin-bottom: 10px; }
        .logo h1 { font-size: 14px; font-weight: 700; line-height: 1.3; }

        .menu-navegacao ul { list-style: none; padding: 0 15px; }
        .menu-navegacao li a {
            display: flex; align-items: center; gap: 10px; padding: 12px 15px; margin-bottom: 5px;
            color: var(--texto-cinza); text-decoration: none; font-size: 14px; font-weight: 600; border-radius: 6px; transition: 0.2s;
        }
        .menu-navegacao li a.ativo, .menu-navegacao li a:hover { background: rgba(209,0,0,0.15); color: var(--vermelho-principal); }

        .conteudo { 
            margin-left: 240px; 
            padding: 35px 45px; 
            min-height: 100vh;
            width: calc(100% - 240px);
        }

        .cabecalho {
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 25px;
        }
        .titulo-pagina { font-size: 26px; font-weight: 800; position: relative; }
        .titulo-pagina::after { content: ''; position: absolute; bottom: -8px; left: 0; width: 70px; height: 3px; background: var(--vermelho-principal); }

        .card-filtro { background: var(--fundo-card); border: 1px solid var(--borda); border-radius: 10px; padding: 20px; margin-bottom: 25px; display: flex; gap: 15px; flex-wrap: wrap; align-items: center; }
        .card-filtro input, .card-filtro select {
            padding: 10px; background: var(--fundo-input); border: 1px solid var(--borda);
            border-radius: 6px; color: var(--texto-branco); font-size: 14px;
        }

        .tabela { width: 100%; border-collapse: collapse; background: var(--fundo-card); border: 1px solid var(--borda); border-radius: 10px; overflow: hidden; min-width: 700px; }
        .tabela th { background: rgba(255,255,255,0.05); padding: 15px; text-align: left; font-size: 13px; font-weight: 700; color: var(--texto-cinza); text-transform: uppercase; white-space: nowrap; }
        .tabela td { padding: 15px; border-bottom: 1px solid var(--borda); font-size: 14px; }
        .tabela tr:hover { background: rgba(255,255,255,0.03); }
        .vazio { text-align: center; padding: 40px !important; color: var(--texto-cinza); }

        .tipo-aluno { padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; text-transform: uppercase; white-space: nowrap; }
        .tipo-kids { background: #2196F320; color: #2196F3; border: 1px solid #2196F340; }
        .tipo-baby-class { background: #9C27B020; color: #9C27B0; border: 1px solid #9C27B040; }
        .tipo-comercial { background: #FF980020; color: #FF9800; border: 1px solid #FF980040; }
        .tipo-competidor { background: #F4433620; color: #F44336; border: 1px solid #F4433640; }
        .tipo-bolsista { background: #4CAF5020; color: #4CAF50; border: 1px solid #4CAF5040; }

        .status-pago { color: var(--verde); font-weight: 600; }
        .status-pendente { color: var(--azul-info); font-weight: 600; }
        .status-atrasado { color: var(--vermelho-atraso); font-weight: 700; }
        .status-sem-pagamento { color: var(--vermelho-atraso); font-weight: 600; }

        .btn-acao { padding: 10px 14px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s; background: var(--verde); color: white; }
        .btn-acao:hover { background: #00E05C; }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--fundo-modal); z-index: 10000; align-items: center; justify-content: center;
        }
        .modal.aberto { display: flex; }
        .modal-conteudo {
            background: var(--fundo-card); border: 1px solid var(--borda); border-radius: 12px;
            padding: 30px; width: 90%; max-width: 450px;
        }
        .modal-titulo { font-size: 20px; font-weight: 700; margin-bottom: 20px; text-align: center; color: var(--vermelho-principal); }
        .modal-grupo { margin-bottom: 15px; }
        .modal-grupo label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 500; }
        .modal-grupo select {
            width: 100%; padding: 12px; background: var(--fundo-input); border: 1px solid var(--borda);
            border-radius: 6px; color: var(--texto-branco); font-size: 15px;
        }
        .info-vencimento { font-size: 13px; color: var(--texto-cinza); margin-top: 5px; }
        .modal-botoes { display: flex; gap: 10px; justify-content: flex-end; margin-top: 25px; }
        .btn-cancelar { background: var(--cinza); color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .btn-remover { background: var(--amarelo); color: #111; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-remover:hover { background: #FFD54F; }
        .btn-confirmar { background: var(--verde); color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }

        @media (max-width: 992px) {
            .conteudo { margin-left: 0; width: 100%; padding: 80px 20px 20px; }
            .btn-menu { display: flex; align-items: center; justify-content: center; }
            .menu-lateral { transform: translateX(-100%); }
            .menu-lateral.aberto { transform: translateX(0); }
        }

        @media (max-width: 600px) {
            .tabela { display: block; overflow-x: auto; }
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
</head>
<body class="tema-escuro">

    <button class="btn-menu" onclick="abrirFecharMenu()">
        <i class="fas fa-bars"></i>
    </button>

    <aside class="menu-lateral" id="menuLateral">
        <div class="logo">
            <img src="imagens/logopjj.png" alt="Logo PJJ">
            <h1>PJJ<br>Pará Jiu-Jitsu</h1>
        </div>
        <nav class="menu-navegacao">
            <ul>
                <li><a href="admin.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="alunos.html"><i class="fas fa-users"></i> Alunos</a></li>
                <li><a href="#" class="ativo"><i class="fas fa-dollar-sign"></i> Financeiro</a></li>
                <li><a href="declaracao.html"><i class="fas fa-file-alt"></i> Declaração</a></li>
                <li><a href="relatorios.html"><i class="fas fa-chart-bar"></i> Relatórios</a></li>
                <li><a href="configuracoes.html"><i class="fas fa-cog"></i> Configurações</a></li>
                <li><a href="#" style="margin-top:20px;color:#FF4D4D" onclick="sair()"><i class="fas fa-sign-out-alt"></i> Sair</a></li>
            </ul>
        </nav>
    </aside>

    <main class="conteudo">
        <div class="cabecalho">
            <h1 class="titulo-pagina">Controle Financeiro</h1>
        </div>

        <div class="card-filtro">
            <input type="text" id="busca" placeholder="🔍 Buscar por nome, CPF ou responsável...">
            <select id="filtroTipo">
                <option value="">Todos os Tipos</option>
                <option value="Kids">Kids</option>
                <option value="Baby Class">Baby Class</option>
                <option value="Comercial">Comercial</option>
                <option value="Competidor">Competidor</option>
            </select>
            <select id="filtroStatus">
                <option value="">Todos os Status</option>
                <option value="Pago">Pago</option>
                <option value="Pendente">Pendente</option>
                <option value="Atrasado">Atrasado</option>
            </select>
        </div>

        <table class="tabela">
            <thead>
                <tr>
                    <th>Nome do Aluno</th>
                    <th>Tipo</th>
                    <th>Plano</th>
                    <th>Valor Mensal</th>
                    <th>Vencimento Cadastrado</th>
                    <th>Status Atual</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="listaAlunos">
                <tr><td colspan="7" class="vazio">Carregando dados...</td></tr>
            </tbody>
        </table>
    </main>

    <div class="modal" id="modalMes">
        <div class="modal-conteudo">
            <h3 class="modal-titulo">Marcar Pagamento do Mês</h3>
            <div class="modal-grupo">
                <label>Aluno:</label>
                <span id="nomeAlunoModal" style="font-weight:600; font-size:15px;"></span>
            </div>
            <div class="modal-grupo">
                <label>Data de início/vencimento:</label>
                <span id="dataVencimentoModal" class="info-vencimento"></span>
            </div>
            <div class="modal-grupo">
                <label>Selecione o Mês/Ano:</label>
                <select id="mesPagamento"></select>
            </div>
            <div class="modal-botoes">
                <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
                <button class="btn-remover" onclick="removerPagamento()">Remover</button>
                <button class="btn-confirmar" onclick="confirmarPagamento()">Confirmar</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAwbIaioYPlQsHEz2bNh5ATi3cGicu12bw",
          authDomain: "pjj-para-jiu-jitsu.firebaseapp.com",
          projectId: "pjj-para-jiu-jitsu",
          storageBucket: "pjj-para-jiu-jitsu.firebasestorage.app",
          messagingSenderId: "72563195814",
          appId: "1:72563195814:web:5bc90e7bc0c51f415c1967"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let alunoSelecionado = null;
        let dataInicioAluno = null;

        function carregarTema() {
            const temaSalvo = localStorage.getItem('tema') || 'escuro';
            const corpo = document.body;
            if (temaSalvo === 'claro') {
                corpo.classList.remove('tema-escuro');
                corpo.classList.add('tema-claro');
            } else {
                corpo.classList.remove('tema-claro');
                corpo.classList.add('tema-escuro');
            }
        }

        function abrirFecharMenu() {
            document.getElementById('menuLateral').classList.toggle('aberto');
        }

        // Verifica status respeitando a data exata do vencimento
        function verificarStatus(mesesPagos = [], dataVencimentoCadastrada = null) {
            const hoje = new Date();
            hoje.setHours(0, 0, 0, 0);

            const mesAtual = String(hoje.getMonth() + 1).padStart(2, '0');
            const anoAtual = hoje.getFullYear();
            const mesAnoAtual = `${mesAtual}/${anoAtual}`;

            let diaVencimento = 1;
            if (dataVencimentoCadastrada) {
                diaVencimento = dataVencimentoCadastrada.getDate();
            }

            const dataVencimentoMesAtual = new Date(anoAtual, hoje.getMonth(), diaVencimento);
            dataVencimentoMesAtual.setHours(0, 0, 0, 0);

            if (!mesesPagos || mesesPagos.length === 0) {
                return { texto: 'Sem pagamentos', classe: 'status-sem-pagamento' };
            }

            if (mesesPagos.includes(mesAnoAtual)) {
                return { texto: 'Em dia', classe: 'status-pago' };
            }

            if (hoje < dataVencimentoMesAtual) {
                const diasRestantes = Math.ceil((dataVencimentoMesAtual - hoje) / (1000 * 60 * 60 * 24));
                const textoDias = diasRestantes === 1 ? 'dia' : 'dias';
                return { 
                    texto: `Pendente (${diasRestantes} ${textoDias} para vencimento)`, 
                    classe: 'status-pendente' 
                };
            }

            return { texto: 'Atrasado', classe: 'status-atrasado' };
        }

        async function carregarLista() {
            const lista = document.getElementById('listaAlunos');
            lista.innerHTML = '<tr><td colspan="7" class="vazio">Carregando dados...</td></tr>';

            try {
                const snapshot = await db.collection('alunos').get();
                if (snapshot.empty) {
                    lista.innerHTML = '<tr><td colspan="7" class="vazio">Nenhum aluno cadastrado</td></tr>';
                    return;
                }

                let alunos = [];
                snapshot.forEach(doc => {
                    const dadosAluno = doc.data();
                    if ((dadosAluno.tipo || '').trim().toLowerCase() !== 'bolsista') {
                        alunos.push({ id: doc.id, dados: dadosAluno });
                    }
                });

                if (alunos.length === 0) {
                    lista.innerHTML = '<tr><td colspan="7" class="vazio">Nenhum aluno não bolsista encontrado</td></tr>';
                    return;
                }

                alunos.sort((a, b) => {
                    const dataVencA = a.dados.dataVencimento ? new Date(a.dados.dataVencimento.toDate()) : null;
                    const dataVencB = b.dados.dataVencimento ? new Date(b.dados.dataVencimento.toDate()) : null;
                    const statusA = verificarStatus(a.dados.mesesPagos, dataVencA);
                    const statusB = verificarStatus(b.dados.mesesPagos, dataVencB);
                    const ordem = { 'status-atrasado': 0, 'status-sem-pagamento': 1, 'status-pendente': 2, 'status-pago': 3 };
                    return ordem[statusA.classe] - ordem[statusB.classe];
                });

                lista.innerHTML = '';

                alunos.forEach(aluno => {
                    const d = aluno.dados;
                    const dataVencObj = d.dataVencimento ? new Date(d.dataVencimento.toDate()) : null;
                    const status = verificarStatus(d.mesesPagos, dataVencObj);
                    const valor = d.valorPlano || 0;
                    const classeTipo = `tipo-${(d.tipo || 'comercial').toLowerCase().replace(/\s/g, '-')}`;
                    const valorTexto = valor === 0 ? 'GRÁTIS' : `R$ ${valor.toFixed(2).replace('.', ',')}`;
                    const dataVenc = dataVencObj ? dataVencObj.toLocaleDateString('pt-BR') : 'Não informada';

                    const linha = `
                    <tr>
                        <td><strong>${d.nome || '-'}</strong></td>
                        <td><span class="tipo-aluno ${classeTipo}">${d.tipo || '-'}</span></td>
                        <td>${d.periodo || '-'}</td>
                        <td>${valorTexto}</td>
                        <td>${dataVenc}</td>
                        <td><span class="${status.classe}">${status.texto}</span></td>
                        <td>
                            <button class="btn-acao" onclick="abrirModal('${aluno.id}', '${d.nome}', ${dataVencObj ? `new Date(${dataVencObj.getTime()})` : 'null'})">
                                Marcar Mês Pago
                            </button>
                        </td>
                    </tr>`;
                    lista.innerHTML += linha;
                });

            } catch (erro) {
                console.error('Erro:', erro);
                lista.innerHTML = `<tr><td colspan="7" class="vazio">Erro: ${erro.message}</td></tr>`;
            }
        }

        function gerarListaMeses(dataInicio) {
            const select = document.getElementById('mesPagamento');
            select.innerHTML = '';

            if (!dataInicio) {
                dataInicio = new Date();
                dataInicio.setDate(1);
            } else {
                dataInicio.setDate(1);
            }

            const nomesMes = [
                'Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho',
                'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'
            ];

            const dataFim = new Date(dataInicio);
            dataFim.setFullYear(dataFim.getFullYear() + 2);

            let dataAtual = new Date(dataInicio);
            while (dataAtual <= dataFim) {
                const mes = String(dataAtual.getMonth() + 1).padStart(2, '0');
                const ano = dataAtual.getFullYear();
                const valor = `${mes}/${ano}`;
                const texto = `${nomesMes[dataAtual.getMonth()]}/${ano}`;

                const opcao = document.createElement('option');
                opcao.value = valor;
                opcao.textContent = texto;
                select.appendChild(opcao);

                dataAtual.setMonth(dataAtual.getMonth() + 1);
            }

            const mesInicio = String(dataInicio.getMonth() + 1).padStart(2, '0');
            const anoInicio = dataInicio.getFullYear();
            select.value = `${mesInicio}/${anoInicio}`;
        }

        function abrirModal(id, nome, dataVenc) {
            alunoSelecionado = id;
            dataInicioAluno = dataVenc;
            document.getElementById('nomeAlunoModal').textContent = nome;
            
            const textoVenc = dataVenc ? dataVenc.toLocaleDateString('pt-BR') : 'Não informada (usando dia 1 do mês)';
            document.getElementById('dataVencimentoModal').textContent = textoVenc;

            gerarListaMeses(dataVenc ? new Date(dataVenc.getTime()) : null);
            document.getElementById('modalMes').classList.add('aberto');
        }

        function fecharModal() {
            document.getElementById('modalMes').classList.remove('aberto');
            alunoSelecionado = null;
            dataInicioAluno = null;
        }

        async function confirmarPagamento() {
            if (!alunoSelecionado) return;

            const mesEscolhido = document.getElementById('mesPagamento').value;

            try {
                const ref = db.collection('alunos').doc(alunoSelecionado);
                const doc = await ref.get();
                const meses = doc.data().mesesPagos || [];

                if (meses.includes(mesEscolhido)) {
                    alert(`Esse mês já está pago para esse aluno!`);
                } else {
                    meses.push(mesEscolhido);
                    await ref.update({ mesesPagos: meses });
                    alert(`Mês ${mesEscolhido} marcado como pago com sucesso!`);
                }

                fecharModal();
                carregarLista();
            } catch (erro) {
                alert('Erro ao salvar: ' + erro.message);
            }
        }

        async function removerPagamento() {
            if (!alunoSelecionado) return;

            const mesEscolhido = document.getElementById('mesPagamento').value;

            if (!confirm(`Tem certeza que deseja REMOVER o pagamento do mês ${mesEscolhido}? Essa ação não pode ser desfeita!`)) {
                return;
            }

            try {
                const ref = db.collection('alunos').doc(alunoSelecionado);
                const doc = await ref.get();
                const meses = doc.data().mesesPagos || [];

                if (!meses.includes(mesEscolhido)) {
                    alert(`Esse mês não está marcado como pago!`);
                } else {
                    const novaLista = meses.filter(mes => mes !== mesEscolhido);
                    await ref.update({ mesesPagos: novaLista });
                    alert(`Pagamento do mês ${mesEscolhido} removido com sucesso!`);
                }

                fecharModal();
                carregarLista();
            } catch (erro) {
                alert('Erro ao remover: ' + erro.message);
            }
        }

        document.getElementById('busca').addEventListener('input', () => {
            const termo = document.getElementById('busca').value.toLowerCase();
            document.querySelectorAll('#listaAlunos tr').forEach(l => {
                if (!l.classList.contains('vazio')) {
                    l.style.display = l.textContent.toLowerCase().includes(termo) ? '' : 'none';
                }
            });
        });

        document.getElementById('filtroTipo').addEventListener('change', () => {
            const filtro = document.getElementById('filtroTipo').value.toLowerCase();
            document.querySelectorAll('#listaAlunos tr').forEach(l => {
                if (!l.classList.contains('vazio')) {
                    l.style.display = !filtro || l.textContent.toLowerCase().includes(filtro) ? '' : 'none';
                }
            });
        });

        document.getElementById('filtroStatus').addEventListener('change', () => {
            const filtro = document.getElementById('filtroStatus').value;
            document.querySelectorAll('#listaAlunos tr').forEach(l => {
                if (!l.classList.contains('vazio')) {
                    const statusTexto = l.querySelector('span:last-child').textContent;
                    l.style.display = !filtro || statusTexto.includes(filtro) ? '' : 'none';
                }
            });
        });

        function sair() {
            if (confirm('Deseja sair do sistema?')) {
                auth.signOut().then(() => window.location.href = 'login.html');
            }
        }

        auth.onAuthStateChanged(usuario => {
            if (!usuario) window.location.href = 'login.html';
            else { carregarTema(); carregarLista(); }
        });
    </script>
</body>
</html>
