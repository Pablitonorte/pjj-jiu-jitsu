<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financeiro - PJJ Pará Jiu-Jitsu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background: #121214; color: #fff; padding: 20px; }
        h1 { margin-bottom: 20px; color: #D10000; }
        .lista-alunos { background: #1A1A1F; border-radius: 10px; border: 1px solid #29292E; }
        .cabecalho-tabela { display: flex; background: rgba(255,255,255,0.05); padding: 15px; font-weight: 700; text-transform: uppercase; font-size: 13px; color: #B0B0B8; }
        .linha-aluno { display: flex; padding: 15px; border-bottom: 1px solid #29292E; align-items: center; }
        .linha-aluno:last-child { border-bottom: none; }
        .col-nome { width: 40%; font-weight: bold; }
        .col-cpf { width: 30%; color: #B0B0B8; }
        .col-tipo { width: 30%; text-align: right; }
        .tipo-aluno { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        .tipo-kids { background: #2196F320; color: #2196F3; border: 1px solid #2196F340; }
        .tipo-competidor { background: #F4433620; color: #F44336; border: 1px solid #F4433640; }
        .carregando { text-align: center; padding: 40px; color: #B0B0B8; }
        .erro { text-align: center; padding: 40px; color: #ff4444; }
    </style>

    <!-- ✅ MESMOS LINKS DO FIREBASE QUE FUNCIONAM NA PÁGINA DE ALUNOS -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="js/config-firebase.js"></script>
</head>
<body>
    <h1>Controle Financeiro</h1>
    <div class="lista-alunos" id="listaAlunos">
        <div class="carregando">🔄 Carregando dados...</div>
    </div>

    <script>
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const lista = document.getElementById('listaAlunos');

        // ✅ MESMA FUNÇÃO DE BUSCA DA PÁGINA DE ALUNOS (QUE FUNCIONA!)
        async function carregarAlunos() {
            try {
                const snapshot = await db.collection('alunos').get();
                
                if (snapshot.empty) {
                    lista.innerHTML = '<div class="erro">Nenhum aluno cadastrado</div>';
                    return;
                }

                let html = `
                <div class="cabecalho-tabela">
                    <div class="col-nome">NOME</div>
                    <div class="col-cpf">CPF</div>
                    <div class="col-tipo">TIPO</div>
                </div>`;

                snapshot.forEach(doc => {
                    const a = doc.data();
                    html += `
                    <div class="linha-aluno">
                        <div class="col-nome">${a.nome || '-'}</div>
                        <div class="col-cpf">${a.cpf || '-'}</div>
                        <div class="col-tipo"><span class="tipo-aluno tipo-${(a.tipo || 'comercial').toLowerCase()}">${a.tipo || '-'}</span></div>
                    </div>`;
                });

                lista.innerHTML = html;

            } catch (erro) {
                console.error('Erro:', erro);
                lista.innerHTML = `<div class="erro">❌ Erro: ${erro.message}</div>`;
            }
        }

        // ✅ MESMA VERIFICAÇÃO DE LOGIN
        firebase.auth().onAuthStateChanged(usuario => {
            if (!usuario) {
                window.location.href = 'login.html';
            } else {
                carregarAlunos();
            }
        });
    </script>
</body>
</html>
