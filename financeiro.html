<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financeiro - PJJ Pará Jiu-Jitsu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

        /* 🎨 Variáveis dos temas */
        :root {
            --vermelho-principal: #D10000;
            --vermelho-claro: #FF3B3B;
            --verde: #00C853;
            --amarelo: #FFC107;
            --azul: #2563eb;
            --cinza: #6B7280;
            --vermelho-atraso: #ff4444;
        }

        /* 🌙 Tema Escuro */
        .tema-escuro {
            --fundo-escuro: #121214;
            --fundo-card: #1A1A1F;
            --texto-branco: #FFFFFF;
            --texto-cinza: #B0B0B8;
            --borda: #29292E;
            --fundo-input: #0C0C0E;
        }

        /* ☀️ Tema Claro */
        .tema-claro {
            --fundo-escuro: #F8F9FA;
            --fundo-card: #FFFFFF;
            --texto-branco: #121214;
            --texto-cinza: #6B7280;
            --borda: #DEE2E6;
            --fundo-input: #FFFFFF;
        }

        html, body { 
            background: var(--fundo-escuro); 
            color: var(--texto-branco); 
            min-height: 100vh; 
            overflow-y: auto;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .btn-menu {
            display: none; position: fixed; top: 15px; left: 15px; z-index: 9999;
            background: var(--vermelho-principal); border: none; color: white;
            width: 48px; height: 48px; border-radius: 8px; font-size: 22px; cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .menu-lateral {
            width: 240px; background: var(--fundo-card); border-right: 1px solid var(--borda);
            padding: 30px 0; position: fixed; height: 100vh; top: 0; left: 0; z-index: 999;
            transition: transform 0.3s ease; overflow-y: auto;
        }
        .menu-lateral.aberto { transform: translateX(0); }
        .menu-lateral.fechado { transform: translateX(-100%); }

        .logo { text-align: center; margin-bottom: 40px; }
        .logo img { width: 90px; margin-bottom: 10px; }
        .logo h1 { font-size: 14px; font-weight: 700; line-height: 1.3; }

        .menu-navegacao ul { list-style: none; padding: 0 15px; }
        .menu-navegacao li a {
            display: flex; align-items: center; gap: 10px; padding: 12px 15px; margin-bottom: 5px;
            color: var(--texto-cinza); text-decoration: none; font-size: 14px; font-weight: 600; border-radius: 6px; transition: 0.2s;
        }
        .menu-navegacao li a.ativo, .menu-navegacao li a:hover { background: rgba(209,0,0,0.15); color: var(--vermelho-principal); }

        .conteudo { 
            margin-left: 240px; 
            padding: 35px 45px; 
            min-height: 100vh;
            width: calc(100% - 240px);
        }

        .cabecalho {
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 25px;
        }
        .titulo-pagina { font-size: 26px; font-weight: 800; position: relative; }
        .titulo-pagina::after { content: ''; position: absolute; bottom: -8px; left: 0; width: 70px; height: 3px; background: var(--vermelho-principal); }

        .card-filtro { background: var(--fundo-card); border: 1px solid var(--borda); border-radius: 10px; padding: 20px; margin-bottom: 25px; display: flex; gap: 15px; flex-wrap: wrap; align-items: center; }
        .card-filtro input, .card-filtro select {
            padding: 10px; background: var(--fundo-input); border: 1px solid var(--borda);
            border-radius: 6px; color: var(--texto-branco); font-size: 14px;
        }

        .tabela { width: 100%; border-collapse: collapse; background: var(--fundo-card); border: 1px solid var(--borda); border-radius: 10px; overflow: hidden; }
        .tabela th { background: rgba(255,255,255,0.05); padding: 15px; text-align: left; font-size: 13px; font-weight: 700; color: var(--texto-cinza); text-transform: uppercase; }
        .tabela td { padding: 15px; border-bottom: 1px solid var(--borda); font-size: 14px; }
        .tabela tr:hover { background: rgba(255,255,255,0.03); }
        .vazio { text-align: center; padding: 40px !important; color: var(--texto-cinza); }

        /* ✅ Cores organizadas e legíveis */
        .status-pago { color: var(--verde); font-weight: 600; }
        .status-aviso { color: var(--amarelo); font-weight: 600; }
        .status-atrasado { color: var(--vermelho-atraso); font-weight: 700; }
        .data-atrasada { color: var(--vermelho-atraso); font-weight: 500; }
        .data-proxima { color: var(--amarelo); font-weight: 500; }
        .data-normal { color: var(--texto-branco); }

        .btn-acao { padding: 6px 10px; border: none; border-radius: 4px; font-size: 12px; font-weight: 600; cursor: pointer; margin-right: 5px; transition: 0.2s; }
        .btn-pago { background: var(--verde); color: white; }
        .btn-pago:hover { background: #00E05C; }
        .btn-pendente { background: var(--amarelo); color: #111; }
        .btn-pendente:hover { background: #FFD54F; }
        .btn-atrasado { background: var(--vermelho-atraso); color: white; }
        .btn-atrasado:hover { background: #FF6666; }

        @media (max-width: 992px) {
            .conteudo { margin-left: 0; width: 100%; padding: 80px 20px 20px; }
            .btn-menu { display: flex; align-items: center; justify-content: center; }
            .menu-lateral { transform: translateX(-100%); }
            .menu-lateral.aberto { transform: translateX(0); }
        }

        @media (max-width: 600px) {
            .tabela { display: block; overflow-x: auto; }
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
</head>
<body class="tema-escuro">

    <button class="btn-menu" onclick="abrirFecharMenu()">
        <i class="fas fa-bars"></i>
    </button>

    <aside class="menu-lateral" id="menuLateral">
        <div class="logo">
            <img src="imagens/logopjj.png" alt="Logo PJJ">
            <h1>PJJ<br>Pará Jiu-Jitsu</h1>
        </div>
        <nav class="menu-navegacao">
            <ul>
                <li><a href="admin.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="alunos.html"><i class="fas fa-users"></i> Alunos</a></li>
                <li><a href="#" class="ativo"><i class="fas fa-dollar-sign"></i> Financeiro</a></li>
                <li><a href="declaracao.html"><i class="fas fa-file-alt"></i> Declaração</a></li>
                <li><a href="relatorios.html"><i class="fas fa-chart-bar"></i> Relatórios</a></li>
                <li><a href="configuracoes.html"><i class="fas fa-cog"></i> Configurações</a></li>
                <li><a href="#" style="margin-top:20px;color:#FF4D4D" onclick="sair()"><i class="fas fa-sign-out-alt"></i> Sair</a></li>
            </ul>
        </nav>
    </aside>

    <main class="conteudo">
        <div class="cabecalho">
            <h1 class="titulo-pagina">Controle Financeiro</h1>
        </div>

        <!-- Filtros -->
        <div class="card-filtro">
            <input type="text" id="busca" placeholder="🔍 Buscar por nome...">
            <select id="filtroStatus">
                <option value="">Todos os status</option>
                <option value="Pago">Pago</option>
                <option value="Pendente">Pendente</option>
                <option value="Aviso">Próximo do vencimento</option>
                <option value="Atrasado">Atrasado</option>
            </select>
        </div>

        <!-- Tabela com dados direto do cadastro -->
        <table class="tabela">
            <thead>
                <tr>
                    <th>Nome do Aluno</th>
                    <th>Tipo de Aluno</th>
                    <th>Período do Plano</th>
                    <th>Valor</th>
                    <th>Vencimento</th>
                    <th>Status do Pagamento</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="listaAlunos">
                <tr><td colspan="7" class="vazio">Carregando dados...</td></tr>
            </tbody>
        </table>
    </main>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAwbIaioYPlQsHEz2bNh5ATi3cGicu12bw",
          authDomain: "pjj-para-jiu-jitsu.firebaseapp.com",
          projectId: "pjj-para-jiu-jitsu",
          storageBucket: "pjj-para-jiu-jitsu.firebasestorage.app",
          messagingSenderId: "72563195814",
          appId: "1:72563195814:web:5bc90e7bc0c51f415c1967"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ✅ Carrega tema salvo
        function carregarTema() {
            const temaSalvo = localStorage.getItem('tema') || 'escuro';
            const corpo = document.body;
            if (temaSalvo === 'claro') {
                corpo.classList.remove('tema-escuro');
                corpo.classList.add('tema-claro');
            } else {
                corpo.classList.remove('tema-claro');
                corpo.classList.add('tema-escuro');
            }
        }

        function abrirFecharMenu() {
            document.getElementById('menuLateral').classList.toggle('aberto');
        }

        // ✅ Calcula vencimento — usa HOJE se não tiver data!
        function calcularVencimento(dataInicio, periodo) {
            // Se não tiver data nenhuma, usa HOJE como base — nunca fica sem data!
            if (!dataInicio || isNaN(new Date(dataInicio).getTime())) {
                console.warn("Sem data de início — usando HOJE como base");
                dataInicio = new Date();
            }
            if (!periodo) {
                console.warn("Período não informado — usando Mensal");
                periodo = 'Mensal';
            }

            const data = new Date(dataInicio);
            
            switch(periodo.trim().toLowerCase()) {
                case 'mensal':
                    data.setMonth(data.getMonth() + 1);
                    break;
                case 'trimestral':
                    data.setMonth(data.getMonth() + 3);
                    break;
                case 'semestral':
                    data.setMonth(data.getMonth() + 6);
                    break;
                case 'anual':
                    data.setFullYear(data.getFullYear() + 1);
                    break;
                default:
                    data.setMonth(data.getMonth() + 1);
            }
            return data;
        }

        // ✅ Verifica se está atrasado
        function estaAtrasado(dataVencimento, statusPagamento) {
            if (!dataVencimento || statusPagamento === 'Pago') return false;
            const hoje = new Date();
            hoje.setHours(0, 0, 0, 0);
            const venc = new Date(dataVencimento);
            venc.setHours(0, 0, 0, 0);
            return hoje > venc;
        }

        // ✅ Verifica se faltam até 3 dias para vencer
        function estaProximoVencimento(dataVencimento, statusPagamento) {
            if (!dataVencimento || statusPagamento === 'Pago') return false;
            const hoje = new Date();
            hoje.setHours(0, 0, 0, 0);
            const venc = new Date(dataVencimento);
            venc.setHours(0, 0, 0, 0);
            const diffDias = Math.ceil((venc - hoje) / (1000 * 60 * 60 * 24));
            return diffDias >= 0 && diffDias <= 3;
        }

        // ✅ Calcula quantos dias está atrasado
        function diasAtrasado(dataVencimento) {
            const hoje = new Date();
            hoje.setHours(0, 0, 0, 0);
            const venc = new Date(dataVencimento);
            venc.setHours(0, 0, 0, 0);
            const diff = hoje - venc;
            return Math.floor(diff / (1000 * 60 * 60 * 24));
        }

        // ✅ CARREGA E ORDENA: VENCIDOS PRIMEIRO, DEPOIS OS PRÓXIMOS
        async function carregarLista() {
            const lista = document.getElementById('listaAlunos');
            lista.innerHTML = '<tr><td colspan="7" class="vazio">Carregando...</td></tr>';

            try {
                const snapshot = await db.collection('alunos').get();

                if (snapshot.empty) {
                    lista.innerHTML = '<tr><td colspan="7" class="vazio">Nenhum aluno cadastrado</td></tr>';
                    return;
                }

                const alunos = [];
                snapshot.forEach(doc => alunos.push({ id: doc.id, dados: doc.data() }));

                // ✅ ORDENAÇÃO PERFEITA:
                // 1. Vencidos mais antigos primeiro
                // 2. Depois os que vencem em breve
                // 3. Depois os que vencem mais tarde
                alunos.sort((a, b) => {
                    // Primeiro tenta usar vencimento direto se salvo no cadastro
                    let vencA, vencB;
                    if (a.dados.vencimento) {
                        vencA = a.dados.vencimento.toDate ? a.dados.vencimento.toDate() : new Date(a.dados.vencimento);
                    } else {
                        const dataA = 
                            a.dados.dataPrimeiraAula?.toDate?.() || 
                            new Date(a.dados.dataPrimeiraAula || a.dados.dataInicio || a.dados.dataCadastro || null);
                        vencA = calcularVencimento(dataA, a.dados.periodoPlano || a.dados.periodo || 'Mensal');
                    }

                    if (b.dados.vencimento) {
                        vencB = b.dados.vencimento.toDate ? b.dados.vencimento.toDate() : new Date(b.dados.vencimento);
                    } else {
                        const dataB = 
                            b.dados.dataPrimeiraAula?.toDate?.() || 
                            new Date(b.dados.dataPrimeiraAula || b.dados.dataInicio || b.dados.dataCadastro || null);
                        vencB = calcularVencimento(dataB, b.dados.periodoPlano || b.dados.periodo || 'Mensal');
                    }

                    return vencA - vencB;
                });

                lista.innerHTML = '';

                for (const aluno of alunos) {
                    const dados = aluno.dados;
                    const alunoId = aluno.id;

                    const nome = dados.nome || '-';
                    const tipoAluno = dados.tipoAluno || dados.tipo || '-';
                    const periodoPlano = dados.periodoPlano || dados.periodo || '-';
                    const valor = dados.valor || dados.valorPlano || dados.mensalidade || 0;

                    // ✅ Usa vencimento direto se existir, senão calcula
                    let dataVencimento;
                    if (dados.vencimento) {
                        dataVencimento = dados.vencimento.toDate ? dados.vencimento.toDate() : new Date(dados.vencimento);
                    } else {
                        const dataInicio = 
                            dados.dataPrimeiraAula?.toDate?.() || 
                            new Date(dados.dataPrimeiraAula || dados.dataInicio || dados.dataCadastro || null);
                        dataVencimento = calcularVencimento(dataInicio, periodoPlano);
                    }

                    // ✅ Formata e aplica cor na data
                    const vencFormatado = dataVencimento.toLocaleDateString('pt-BR');
                    let classeData = 'data-normal';
                    const statusPagamento = dados.statusPagamento || 'Pendente';
                    const atrasado = estaAtrasado(dataVencimento, statusPagamento);
                    const proximo = estaProximoVencimento(dataVencimento, statusPagamento);
                    const dias = atrasado ? diasAtrasado(dataVencimento) : 0;

                    if (statusPagamento !== 'Pago') {
                        if (atrasado) classeData = 'data-atrasada';
                        else if (proximo) classeData = 'data-proxima';
                    }

                    // Define cor e texto do status
                    let classeStatus, textoStatus, classeBotao, textoBotao;
                    if (statusPagamento === 'Pago') {
                        classeStatus = 'status-pago';
                        textoStatus = 'Pago';
                        classeBotao = 'btn-pendente';
                        textoBotao = 'Marcar Pendente';
                    } else if (atrasado) {
                        classeStatus = 'status-atrasado';
                        textoStatus = `Atrasado (${dias} dia${dias !== 1 ? 's' : ''})`;
                        classeBotao = 'btn-atrasado';
                        textoBotao = 'Marcar Pago';
                    } else if (proximo) {
                        classeStatus = 'status-aviso';
                        textoStatus = 'Próximo do vencimento';
                        classeBotao = 'btn-pago';
                        textoBotao = 'Marcar Pago';
                    } else {
                        classeStatus = 'status-pendente';
                        textoStatus = 'Pendente';
                        classeBotao = 'btn-pago';
                        textoBotao = 'Marcar Pago';
                    }

                    // ✅ MOSTRA TUDO — só ignora valores zero pagos
                    if (valor <= 0 && statusPagamento === 'Pago') continue;

                    const linha = `
                    <tr>
                        <td>${nome}</td>
                        <td>${tipoAluno}</td>
                        <td>${periodoPlano}</td>
                        <td>R$ ${valor.toFixed(2).replace('.', ',')}</td>
                        <td class="${classeData}">${vencFormatado}</td>
                        <td><span class="${classeStatus}">${textoStatus}</span></td>
                        <td>
                            <button class="btn-acao ${classeBotao}" 
                                onclick="alterarStatus('${alunoId}', '${statusPagamento}')">
                                ${textoBotao}
                            </button>
                        </td>
                    </tr>`;

                    lista.innerHTML += linha;
                }

            } catch (erro) {
                console.error('Erro ao carregar:', erro);
                lista.innerHTML = `<tr><td colspan="7" class="vazio">Erro: ${erro.message}</td></tr>`;
            }
        }

        // Apenas altera o status no próprio cadastro do aluno
        async function alterarStatus(alunoId, statusAtual) {
            const novoStatus = statusAtual === 'Pago' ? 'Pendente' : 'Pago';
            try {
                await db.collection('alunos').doc(alunoId).update({
                    statusPagamento: novoStatus
                });
                carregarLista(); // Atualiza a tela
            } catch (erro) {
                alert('Erro ao alterar status: ' + erro.message);
            }
        }

        // Filtro de busca
        document.getElementById('busca').addEventListener('input', () => {
            const termo = document.getElementById('busca').value.toLowerCase().trim();
            document.querySelectorAll('#listaAlunos tr').forEach(linha => {
                if (linha.classList.contains('vazio')) return;
                linha.style.display = linha.textContent.toLowerCase().includes(termo) ? '' : 'none';
            });
        });

        // Filtro por status atualizado
        document.getElementById('filtroStatus').addEventListener('change', () => {
            const filtro = document.getElementById('filtroStatus').value;
            document.querySelectorAll('#listaAlunos tr').forEach(linha => {
                if (linha.classList.contains('vazio')) return;
                if (!filtro) {
                    linha.style.display = '';
                    return;
                }
                const statusTexto = linha.querySelector('span').textContent;
                if (filtro === 'Aviso') {
                    linha.style.display = statusTexto.includes('Próximo') ? '' : 'none';
                } else if (filtro === 'Atrasado') {
                    linha.style.display = statusTexto.includes('Atrasado') ? '' : 'none';
                } else {
                    linha.style.display = statusTexto === filtro ? '' : 'none';
                }
            });
        });

        // Inicializa
        auth.onAuthStateChanged(usuario => {
            if (!usuario) {
                window.location.href = 'login.html';
            } else {
                carregarTema();
                carregarLista();
            }
        });

        function sair() {
            if (confirm('Deseja sair do sistema?')) {
                auth.signOut().then(() => window.location.href = 'login.html');
            }
        }
    </script>

</body>
</html>
