<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico Financeiro - PJJ Pará Jiu-Jitsu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        :root { --fundo-escuro: #121214; --fundo-card: #1A1A1F; --vermelho-principal: #D10000; --texto-branco: #FFFFFF; --texto-cinza: #B0B0B8; --borda: #29292E; --verde: #00C853; --amarelo: #FFC107; --azul: #2563eb; }
        html, body { background: var(--fundo-escuro); color: var(--texto-branco); min-height: 100vh; overflow-y: auto; }
        .btn-menu { display: none; position: fixed; top: 15px; left: 15px; z-index: 9999; background: var(--vermelho-principal); border: none; color: white; width: 48px; height: 48px; border-radius: 8px; font-size: 22px; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        .menu-lateral { width: 240px; background: var(--fundo-escuro); border-right: 1px solid var(--borda); padding: 30px 0; position: fixed; height: 100vh; top: 0; left: 0; z-index: 999; transition: transform 0.3s ease; overflow-y: auto; }
        .menu-lateral.fechado { transform: translateX(-100%); }
        .logo { text-align: center; margin-bottom: 40px; }
        .logo img { width: 90px; margin-bottom: 10px; }
        .logo h1 { font-size: 14px; font-weight: 700; line-height: 1.3; }
        .menu-navegacao ul { list-style: none; padding: 0 15px; }
        .menu-navegacao li a { display: flex; align-items: center; gap: 10px; padding: 12px 15px; margin-bottom: 5px; color: var(--texto-cinza); text-decoration: none; font-size: 14px; font-weight: 600; border-radius: 6px; transition: 0.2s; }
        .menu-navegacao li a.ativo, .menu-navegacao li a:hover { background: rgba(209,0,0,0.15); color: var(--vermelho-principal); }
        .conteudo { margin-left: 240px; padding: 35px 45px; min-height: 100vh; width: calc(100% - 240px); }
        .cabecalho { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 30px; }
        .titulo-pagina { font-size: 26px; font-weight: 800; position: relative; }
        .titulo-pagina::after { content: ''; position: absolute; bottom: -8px; left: 0; width: 70px; height: 3px; background: var(--vermelho-principal); }
        .tabela { width: 100%; border-collapse: collapse; background: var(--fundo-card); border: 1px solid var(--borda); border-radius: 10px; overflow: hidden; }
        .tabela th { background: #1f1f25; padding: 15px; text-align: left; font-size: 13px; font-weight: 700; color: var(--texto-cinza); text-transform: uppercase; }
        .tabela td { padding: 15px; border-bottom: 1px solid var(--borda); font-size: 14px; }
        .vazio { text-align: center; padding: 40px !important; color: var(--texto-cinza); }
        .status-pago { color: var(--verde); font-weight: bold; }
        @media (max-width: 992px) { .conteudo { margin-left: 0; width: 100%; padding: 80px 20px 20px; } .btn-menu { display: flex; align-items: center; justify-content: center; } .menu-lateral { transform: translateX(-100%); } .menu-lateral.aberto { transform: translateX(0); } }
    </style>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <button class="btn-menu" onclick="abrirFecharMenu()"><i class="fas fa-bars"></i></button>
    <aside class="menu-lateral" id="menuLateral">
        <div class="logo"><img src="imagens/logopjj.png" alt="Logo PJJ"><h1>PJJ<br>Pará Jiu-Jitsu</h1></div>
        <nav class="menu-navegacao">
            <ul>
                <li><a href="admin.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="alunos.html"><i class="fas fa-users"></i> Alunos</a></li>
                <li><a href="financeiro.html"><i class="fas fa-dollar-sign"></i> Financeiro</a></li>
                <li><a href="#" class="ativo"><i class="fas fa-history"></i> Histórico Financeiro</a></li>
                <li><a href="relatorios.html"><i class="fas fa-file-alt"></i> Relatórios</a></li>
                <li><a href="configuracoes.html"><i class="fas fa-cog"></i> Configurações</a></li>
                <li><a href="#" style="margin-top:20px;color:#FF4D4D" onclick="sair()"><i class="fas fa-sign-out-alt"></i> Sair</a></li>
            </ul>
        </nav>
    </aside>
    <main class="conteudo">
        <div class="cabecalho"><h1 class="titulo-pagina">Histórico de Pagamentos</h1></div>
        <table class="tabela">
            <thead><tr><th>Aluno</th><th>Mês/Ano</th><th>Valor</th><th>Data Pagamento</th><th>Status</th></tr></thead>
            <tbody id="listaHistorico"><tr><td colspan="5" class="vazio">Carregando...</td></tr>
            </tbody>
        </table>
    </main>
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAwbIaioYPlQsHEz2bNh5ATi3cGicu12bw",
          authDomain: "pjj-para-jiu-jitsu.firebaseapp.com",
          projectId: "pjj-para-jiu-jitsu",
          storageBucket: "pjj-para-jiu-jitsu.firebasestorage.app",
          messagingSenderId: "72563195814",
          appId: "1:72563195814:web:5bc90e7bc0c51f415c1967"
        };
        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        function abrirFecharMenu() { document.getElementById('menuLateral').classList.toggle('aberto'); }
        async function carregarHistorico() {
            const lista = document.getElementById('listaHistorico');
            try {
                const snapshot = await db.collection('mensalidades').where('status', 'in', ['Pago', 'Gratuito']).orderBy('dataPagamento', 'desc').get();
                if (snapshot.empty) { lista.innerHTML = '<tr><td colspan="5" class="vazio">Nenhum pagamento registrado</td></tr>'; return; }
                lista.innerHTML = '';
                snapshot.forEach(doc => {
                    const d = doc.data();
                    lista.innerHTML += `
                    <tr>
                        <td>${d.nomeAluno || '-'}</td>
                        <td>${d.mesAno || '-'}</td>
                        <td>${d.valor === 0 ? 'GRÁTIS' : `R$ ${d.valor.toFixed(2).replace('.', ',')}`}</td>
                        <td>${d.dataPagamento ? d.dataPagamento.toDate().toLocaleDateString('pt-BR') : '-'}</td>
                        <td class="status-pago">${d.status}</td>
                    </tr>`;
                });
            } catch (erro) { lista.innerHTML = `<tr><td colspan="5" class="vazio">Erro: ${erro.message}</td></tr>`; }
        }
        function sair() { if (confirm('Sair?')) auth.signOut().then(() => window.location.href = 'login.html'); }
        auth.onAuthStateChanged(usuario => { if (!usuario) window.location.href = 'login.html'; else carregarHistorico(); });
    </script>
</body>
</html>
