<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alunos - PJJ Pará Jiu-Jitsu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        :root {
            --fundo-escuro: #121214; --fundo-card: #1A1A1F; --vermelho-principal: #D10000;
            --vermelho-claro: #FF3B3B; --texto-branco: #FFFFFF; --texto-cinza: #B0B0B8; --borda: #29292E;
        }
        body { background: var(--fundo-escuro); color: var(--texto-branco); min-height: 100vh; }

        .btn-menu {
            display: none; position: fixed; top: 15px; left: 15px; z-index: 9999;
            background: var(--vermelho-principal); border: none; color: white;
            width: 48px; height: 48px; border-radius: 8px; font-size: 22px; cursor: pointer;
        }

        .menu-lateral {
            width: 240px; background: var(--fundo-escuro); border-right: 1px solid var(--borda);
            padding: 30px 0; position: fixed; height: 100vh; top: 0; left: 0; z-index: 999;
            transition: transform 0.3s ease;
        }
        .menu-lateral.fechado { transform: translateX(-100%); }

        .logo { text-align: center; margin-bottom: 40px; }
        .logo img { width: 90px; margin-bottom: 10px; }
        .logo h1 { font-size: 14px; font-weight: 700; line-height: 1.3; }

        .menu-navegacao ul { list-style: none; padding: 0 15px; }
        .menu-navegacao li a {
            display: flex; align-items: center; gap: 10px; padding: 12px 15px; margin-bottom: 5px;
            color: var(--texto-cinza); text-decoration: none; font-size: 14px; font-weight: 600; border-radius: 6px; transition: 0.2s;
        }
        .menu-navegacao li a.ativo, .menu-navegacao li a:hover { background: rgba(209,0,0,0.15); color: var(--vermelho-principal); }

        .conteudo { margin-left: 240px; padding: 35px 45px; padding-top: 30px; }
        .cabecalho {
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 35px;
        }
        .titulo-pagina { font-size: 26px; font-weight: 800; position: relative; }
        .titulo-pagina::after { content: ''; position: absolute; bottom: -8px; left: 0; width: 70px; height: 3px; background: var(--vermelho-principal); }
        .btn-novo { background: var(--vermelho-principal); color: white; border: none; padding: 12px 20px; border-radius: 6px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .btn-novo:hover { background: var(--vermelho-claro); }

        .card-busca { background: var(--fundo-card); border: 1px solid var(--borda); border-radius: 10px; padding: 20px; margin-bottom: 25px; }
        .card-busca input {
            width: 100%; padding: 14px; background: var(--fundo-escuro); border: 1px solid var(--borda);
            border-radius: 6px; color: white; font-size: 14px; outline: none;
        }
        .card-busca input:focus { border-color: var(--vermelho-principal); }

        .tabela-alunos { width: 100%; border-collapse: collapse; background: var(--fundo-card); border: 1px solid var(--borda); border-radius: 10px; overflow: hidden; }
        .tabela-alunos th { background: #1f1f25; padding: 15px; text-align: left; font-size: 13px; font-weight: 700; color: var(--texto-cinza); text-transform: uppercase; }
        .tabela-alunos td { padding: 15px; border-bottom: 1px solid var(--borda); font-size: 14px; }
        .tabela-alunos tr:hover { background: rgba(255,255,255,0.03); }
        .vazio { text-align: center; padding: 40px !important; color: var(--texto-cinza); }

        .btn-acao { padding: 8px 12px; border: none; border-radius: 4px; font-size: 13px; font-weight: 600; cursor: pointer; margin-right: 5px; }
        .btn-editar { background: #2563eb; color: white; }
        .btn-excluir { background: var(--vermelho-principal); color: white; }

        @media (max-width: 768px) {
            .btn-menu { display: flex; }
            .conteudo { margin-left: 0; padding: 80px 20px 20px 20px; }
            .cabecalho { flex-direction: column; align-items: flex-start; }
            .tabela-alunos { display: block; overflow-x: auto; }
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
</head>
<body>

    <button class="btn-menu" onclick="toggleMenu()">
        <i class="fas fa-bars"></i>
    </button>

    <aside class="menu-lateral" id="menuLateral">
        <div class="logo">
            <img src="imagens/logopjj.png" alt="Logo PJJ">
            <h1>PJJ<br>Pará Jiu-Jitsu</h1>
        </div>
        <nav class="menu-navegacao">
            <ul>
                <li><a href="admin.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="#" class="ativo"><i class="fas fa-users"></i> Alunos</a></li>
                <li><a href="financeiro.html"><i class="fas fa-dollar-sign"></i> Financeiro</a></li>
                <li><a href="#"><i class="fas fa-medal"></i> Graduações</a></li>
                <li><a href="#"><i class="fas fa-file-alt"></i> Relatórios</a></li>
                <li><a href="#"><i class="fas fa-cog"></i> Configurações</a></li>
                <li><a href="#" style="margin-top:20px;color:#FF4D4D" onclick="sair()"><i class="fas fa-sign-out-alt"></i> Sair</a></li>
            </ul>
        </nav>
    </aside>

    <main class="conteudo">
        <div class="cabecalho">
            <h1 class="titulo-pagina">Gerenciar Alunos</h1>
            <button class="btn-novo" onclick="window.location.href='admin.html'"><i class="fas fa-plus"></i> Novo Aluno</button>
        </div>

        <div class="card-busca">
            <input type="text" id="busca" placeholder="🔍 Buscar aluno por nome, CPF ou faixa..." onkeyup="filtrarAlunos()">
        </div>

        <table class="tabela-alunos">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Faixa</th>
                    <th>Telefone</th>
                    <th>Data Cadastro</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="listaAlunos">
                <tr><td colspan="5" class="vazio">Carregando alunos...</td></tr>
            </tbody>
        </table>
    </main>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAwbIaioYPlQsHEz2bNh5ATi3cGicu12bw",
          authDomain: "pjj-para-jiu-jitsu.firebaseapp.com",
          projectId: "pjj-para-jiu-jitsu",
          storageBucket: "pjj-para-jiu-jitsu.firebasestorage.app",
          messagingSenderId: "72563195814",
          appId: "1:72563195814:web:5bc90e7bc0c51f415c1967"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function toggleMenu() {
            document.getElementById('menuLateral').classList.toggle('fechado');
        }

        async function carregarAlunos() {
            const lista = document.getElementById('listaAlunos');
            lista.innerHTML = '';

            try {
                const snapshot = await db.collection('alunos').orderBy('nome').get();

                if (snapshot.empty) {
                    lista.innerHTML = `<tr><td colspan="5" class="vazio">Nenhum aluno cadastrado ainda.</td></tr>`;
                    return;
                }

                snapshot.forEach(doc => {
                    const aluno = doc.data();
                    const dataCad = aluno.dataCadastro?.toDate() || new Date();
                    
                    lista.innerHTML += `
                    <tr>
                        <td><strong>${aluno.nome}</strong></td>
                        <td>${aluno.faixa || '—'}</td>
                        <td>${aluno.telefone || 'Não informado'}</td>
                        <td>${dataCad.toLocaleDateString('pt-BR')}</td>
                        <td>
                            <button class="btn-acao btn-editar">Editar</button>
                            <button class="btn-acao btn-excluir">Excluir</button>
                        </td>
                    </tr>`;
                });

            } catch (erro) {
                console.error(erro);
                lista.innerHTML = `<tr><td colspan="5" class="vazio">Erro ao carregar alunos: ${erro.message}</td></tr>`;
            }
        }

        function filtrarAlunos() {
            const termo = document.getElementById('busca').value.toLowerCase();
            const linhas = document.querySelectorAll('#listaAlunos tr');
            
            linhas.forEach(linha => {
                const texto = linha.textContent.toLowerCase();
                linha.style.display = texto.includes(termo) ? '' : 'none';
            });
        }

        function sair() {
            if(confirm('Deseja realmente sair?')) auth.signOut().then(()=>window.location.href='login.html');
        }

        auth.onAuthStateChanged(usuario => {
            if (!usuario) window.location.href='login.html';
            else carregarAlunos();
        });
    </script>
</body>
</html>
