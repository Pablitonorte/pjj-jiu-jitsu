<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alunos - PJJ Pará Jiu-Jitsu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

        :root {
            --vermelho-principal: #D10000;
            --vermelho-claro: #FF3B3B;
            --verde: #00C853;
            --amarelo: #FFC107;
            --azul: #2563eb;
            --cinza: #6B7280;
        }

        .tema-escuro {
            --fundo-escuro: #121214;
            --fundo-card: #1A1A1F;
            --texto-branco: #FFFFFF;
            --texto-cinza: #B0B0B8;
            --borda: #29292E;
            --fundo-input: #0C0C0E;
        }

        .tema-claro {
            --fundo-escuro: #F8F9FA;
            --fundo-card: #FFFFFF;
            --texto-branco: #121214;
            --texto-cinza: #6B7280;
            --borda: #DEE2E6;
            --fundo-input: #FFFFFF;
        }

        html, body { 
            background: var(--fundo-escuro); 
            color: var(--texto-branco); 
            min-height: 100vh; 
            overflow-y: auto;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .btn-menu {
            display: none; position: fixed; top: 15px; left: 15px; z-index: 9999;
            background: var(--vermelho-principal); border: none; color: white;
            width: 48px; height: 48px; border-radius: 8px; font-size: 22px; cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .menu-lateral {
            width: 240px; background: var(--fundo-card); border-right: 1px solid var(--borda);
            padding: 30px 0; position: fixed; height: 100vh; top: 0; left: 0; z-index: 999;
            transition: transform 0.3s ease; overflow-y: auto;
        }
        .menu-lateral.fechado { transform: translateX(-100%); }
        .menu-lateral.aberto { transform: translateX(0); }

        .logo { text-align: center; margin-bottom: 40px; }
        .logo img { width: 90px; margin-bottom: 10px; }
        .logo h1 { font-size: 14px; font-weight: 700; line-height: 1.3; color: var(--texto-branco); }

        .menu-navegacao ul { list-style: none; padding: 0 15px; }
        .menu-navegacao li a {
            display: flex; align-items: center; gap: 10px; padding: 12px 15px; margin-bottom: 5px;
            color: var(--texto-cinza); text-decoration: none; font-size: 14px; font-weight: 600; border-radius: 6px; transition: 0.2s;
        }
        .menu-navegacao li a.ativo, .menu-navegacao li a:hover { background: rgba(209,0,0,0.15); color: var(--vermelho-principal); }
        .menu-navegacao li a.sair { color: #FF4D4D; margin-top: 20px; }

        .conteudo { 
            margin-left: 240px; 
            padding: 35px 45px; 
            min-height: 100vh;
            width: calc(100% - 240px);
        }

        .cabecalho {
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 25px;
        }
        .titulo-pagina { font-size: 26px; font-weight: 800; position: relative; }
        .titulo-pagina::after { content: ''; position: absolute; bottom: -8px; left: 0; width: 70px; height: 3px; background: var(--vermelho-principal); }
        
        .btn-novo { 
            background: var(--verde); color: white; border: none; padding: 12px 20px; 
            border-radius: 6px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px;
            transition: 0.2s;
        }
        .btn-novo:hover { background: #00b348; }

        .card-filtro { background: var(--fundo-card); border: 1px solid var(--borda); border-radius: 10px; padding: 20px; margin-bottom: 25px; display: flex; gap: 15px; flex-wrap: wrap; }
        .card-filtro input, .card-filtro select {
            flex: 1; min-width: 180px; padding: 12px; background: var(--fundo-input); border: 1px solid var(--borda);
            border-radius: 6px; color: var(--texto-branco); font-size: 14px; outline: none;
        }
        .card-filtro input:focus, .card-filtro select:focus { border-color: var(--vermelho-principal); box-shadow: 0 0 0 2px rgba(209,0,0,0.15); }

        .tabela { 
            width: 100%; 
            border-collapse: collapse; 
            background: var(--fundo-card); 
            border: 1px solid var(--borda); 
            border-radius: 10px; 
            overflow: hidden; 
            min-width: 900px;
            table-layout: auto;
        }
        .tabela th { background: rgba(255,255,255,0.05); padding: 15px; text-align: left; font-size: 13px; font-weight: 700; color: var(--texto-cinza); text-transform: uppercase; white-space: nowrap; }
        .tabela td { padding: 15px; border-bottom: 1px solid var(--borda); font-size: 14px; color: var(--texto-branco); word-break: break-word; }
        .tabela tr:hover { background: rgba(255,255,255,0.03); }
        .vazio { text-align: center; padding: 40px !important; color: var(--texto-cinza); }

        .tipo-aluno { padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; text-transform: uppercase; white-space: nowrap; }
        .tipo-kids { background: #2196F320; color: #2196F3; border: 1px solid #2196F340; }
        .tipo-baby-class { background: #9C27B020; color: #9C27B0; border: 1px solid #9C27B040; }
        .tipo-comercial { background: #FF980020; color: #FF9800; border: 1px solid #FF980040; }
        .tipo-competidor { background: #F4433620; color: #F44336; border: 1px solid #F4433640; }
        .tipo-bolsista { background: #4CAF5020; color: #4CAF50; border: 1px solid #4CAF5040; }

        .faixa { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; text-transform: uppercase; white-space: nowrap; }
        .faixa-branca { background: #FFFFFF; color: #121214; border: 1px solid #ddd; }
        .faixa-cinza { background: #888888; color: #FFFFFF; }
        .faixa-amarela { background: #FFD700; color: #121214; }
        .faixa-laranja { background: #FF8C00; color: #FFFFFF; }
        .faixa-verde { background: #228B22; color: #FFFFFF; }
        .faixa-azul { background: #0066CC; color: #FFFFFF; }
        .faixa-roxa { background: #800080; color: #FFFFFF; }
        .faixa-marrom { background: #8B4513; color: #FFFFFF; }
        .faixa-preta { background: #000000; color: #FFFFFF; border: 1px solid #555; }

        .btn-acao { padding: 8px 12px; border: none; border-radius: 4px; font-size: 13px; font-weight: 600; cursor: pointer; margin-right: 5px; transition: 0.2s; white-space: nowrap; }
        .btn-editar { background: var(--azul); color: white; }
        .btn-editar:hover { background: #3b82f6; }
        .btn-excluir { background: var(--vermelho-principal); color: white; }
        .btn-excluir:hover { background: var(--vermelho-claro); }
        .btn-declaracao { background: var(--amarelo); color: #111; }
        .btn-declaracao:hover { background: #FFD54F; }

        .fundo-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 2000;
            justify-content: center; align-items: flex-start;
            padding: 20px;
            overflow-y: auto;
        }
        .modal {
            background: var(--fundo-card); border: 1px solid var(--borda); border-radius: 10px;
            padding: 30px; width: 100%; max-width: 650px;
            margin: 20px auto;
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
        }
        .modal h2 { color: var(--vermelho-principal); margin-bottom: 25px; font-size: 22px; font-weight: 800; }
        .fechar-modal {
            position: absolute; top: 15px; right: 15px; background: none; border: none;
            color: var(--texto-cinza); font-size: 28px; cursor: pointer; transition: 0.2s;
        }
        .fechar-modal:hover { color: var(--vermelho-principal); }

        .secao { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid var(--borda); }
        .secao h3 { font-size: 16px; font-weight: 600; color: var(--texto-cinza); margin-bottom: 15px; }

        .linha { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 18px; }
        .campo { display: flex; flex-direction: column; }
        .campo label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 600; color: var(--texto-branco); }
        .campo input, .campo select {
            width: 100%; padding: 12px; background: var(--fundo-input); border: 1px solid var(--borda);
            border-radius: 6px; color: var(--texto-branco); font-size: 14px;
        }
        .campo input:focus, .campo select:focus {
            outline: none; border-color: var(--vermelho-principal); box-shadow: 0 0 0 2px rgba(209,0,0,0.15);
        }
        .opcional { font-size: 12px; color: var(--texto-cinza); font-weight: normal; }
        .valor-final { margin-top: 5px; font-size: 18px; font-weight: 800; color: var(--verde); }
        .valor-gratis { color: #4CAF50; }
        .valor-vazio { color: var(--texto-cinza); font-style: italic; }

        @media (max-width: 992px) {
            .conteudo { margin-left: 0; width: 100%; padding: 80px 20px 20px; }
            .btn-menu { display: flex; align-items: center; justify-content: center; }
            .menu-lateral { transform: translateX(-100%); }
            .menu-lateral.aberto { transform: translateX(0); }
        }

        @media (max-width: 600px) {
            .linha { grid-template-columns: 1fr; }
            .modal { padding: 20px; margin: 10px auto; }
            .tabela { display: block; overflow-x: auto; }
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
</head>
<body class="tema-escuro">

    <button class="btn-menu" onclick="abrirFecharMenu()">
        <i class="fas fa-bars"></i>
    </button>

    <aside class="menu-lateral" id="menuLateral">
        <div class="logo">
            <img src="imagens/logopjj.png" alt="Logo PJJ">
            <h1>PJJ<br>Pará Jiu-Jitsu</h1>
        </div>
        <nav class="menu-navegacao">
            <ul>
                <li><a href="admin.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="#" class="ativo"><i class="fas fa-users"></i> Alunos</a></li>
                <li><a href="financeiro.html"><i class="fas fa-dollar-sign"></i> Financeiro</a></li>
                <li><a href="declaracao.html"><i class="fas fa-file-alt"></i> Declaração</a></li>
                <li><a href="relatorios.html"><i class="fas fa-chart-bar"></i> Relatórios</a></li>
                <li><a href="configuracoes.html"><i class="fas fa-cog"></i> Configurações</a></li>
                <li><a href="#" class="sair" onclick="sair()"><i class="fas fa-sign-out-alt"></i> Sair</a></li>
            </ul>
        </nav>
    </aside>

    <main class="conteudo">
        <div class="cabecalho">
            <h1 class="titulo-pagina">Gerenciar Alunos</h1>
            <button class="btn-novo" onclick="abrirModalCadastro()">
                <i class="fas fa-plus"></i> Novo Aluno
            </button>
        </div>

        <div class="card-filtro">
            <input type="text" id="buscaAluno" placeholder="🔍 Buscar por nome, CPF ou responsável...">
            <select id="filtroTipo">
                <option value="">Todos os Tipos</option>
                <option value="Kids">Kids</option>
                <option value="Baby Class">Baby Class</option>
                <option value="Comercial">Comercial</option>
                <option value="Competidor">Competidor</option>
                <option value="Bolsista">Bolsista</option>
            </select>
            <select id="filtroPeriodo">
                <option value="">Todos os Planos</option>
                <option value="Mensal">Mensal</option>
                <option value="Trimestral">Trimestral</option>
                <option value="Semestral">Semestral</option>
                <option value="Anual">Anual</option>
            </select>
        </div>

        <table class="tabela">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>CPF</th>
                    <th>Tipo</th>
                    <th>Responsável</th>
                    <th>Nascimento</th>
                    <th>Plano</th>
                    <th>Valor Final</th>
                    <th>Faixa</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="listaAlunos">
                <tr><td colspan="9" class="vazio">🔄 Carregando alunos...</td></tr>
            </tbody>
        </table>
    </main>

    <div id="modalCadastro" class="fundo-modal">
        <div class="modal">
            <button class="fechar-modal" onclick="fecharModalCadastro()">&times;</button>
            <h2 id="tituloModal">Cadastrar Novo Aluno</h2>
            <form id="formAluno">
                <input type="hidden" id="idAluno" value="">

                <div class="secao">
                    <h3>Dados Pessoais</h3>
                    <div class="linha">
                        <div class="campo">
                            <label>Nome Completo *</label>
                            <input type="text" id="nomeAluno" required>
                        </div>
                        <div class="campo">
                            <label>CPF *</label>
                            <input type="text" id="cpfAluno" placeholder="000.000.000-00" maxlength="14" required>
                        </div>
                    </div>
                    <div class="linha">
                        <div class="campo">
                            <label>Tipo de Aluno *</label>
                            <select id="tipoAluno" onchange="atualizarValorPlano()" required>
                                <option value="">Selecione</option>
                                <option value="Kids">Kids</option>
                                <option value="Baby Class">Baby Class</option>
                                <option value="Comercial">Comercial</option>
                                <option value="Competidor">Competidor</option>
                                <option value="Bolsista">Bolsista (Gratuito)</option>
                            </select>
                        </div>
                        <div class="campo">
                            <label>Data de Nascimento *</label>
                            <input type="date" id="nascimentoAluno" required>
                        </div>
                    </div>
                    <div class="linha">
                        <div class="campo">
                            <label>Nome do Responsável <span class="opcional">(opcional)</span></label>
                            <input type="text" id="responsavelAluno">
                        </div>
                        <div class="campo">
                            <label>E-mail <span class="opcional">(opcional)</span></label>
                            <input type="email" id="emailAluno">
                        </div>
                    </div>
                    <div class="linha">
                        <div class="campo">
                            <label>Telefone / Contato <span class="opcional">(opcional)</span></label>
                            <input type="text" id="telefoneAluno" placeholder="(91) 99999-9999">
                        </div>
                        <div class="campo">
                            <label>Data do Vencimento *</label>
                            <input type="date" id="vencimentoAluno" required>
                        </div>
                    </div>
                </div>

                <div class="secao">
                    <h3>Plano e Valores</h3>
                    <div class="linha">
                        <div class="campo">
                            <label>Período do Plano *</label>
                            <select id="periodoAluno" onchange="atualizarValorPlano()" required>
                                <option value="">Selecione</option>
                                <option value="Mensal">Mensal - R$ 90,00</option>
                                <option value="Trimestral">Trimestral - R$ 240,00</option>
                                <option value="Semestral">Semestral - R$ 450,00</option>
                                <option value="Anual">Anual - R$ 820,00</option>
                            </select>
                        </div>
                        <div class="campo">
                            <label>Desconto (%) <span class="opcional">(opcional)</span></label>
                            <input type="number" id="descontoAluno" min="0" max="100" step="0.1" value="0" oninput="atualizarValorPlano()">
                        </div>
                    </div>
                    <div class="linha">
                        <div class="campo">
                            <label>Valor Final</label>
                            <input type="text" id="valorFinalAluno" class="valor-final valor-vazio" value="Selecione o tipo e o plano" readonly>
                        </div>
                        <div class="campo">
                            <label>Faixa Inicial *</label>
                            <select id="faixaAluno" required>
                                <option value="">Selecione</option>
                                <option value="Branca">Branca</option>
                                <option value="Cinza">Cinza</option>
                                <option value="Amarela">Amarela</option>
                                <option value="Laranja">Laranja</option>
                                <option value="Verde">Verde</option>
                                <option value="Azul">Azul</option>
                                <option value="Roxa">Roxa</option>
                                <option value="Marrom">Marrom</option>
                                <option value="Preta">Preta</option>
                            </select>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-salvar" style="width:100%;padding:14px;background:var(--verde);color:white;border:none;border-radius:6px;font-weight:700;font-size:16px;cursor:pointer;">Salvar Aluno</button>
            </form>
        </div>
    </div>

    <script>
        // ✅ MESMA CONFIGURAÇÃO DO FINANCEIRO (não depende de arquivo externo)
        const firebaseConfig = {
          apiKey: "AIzaSyAwbIaioYPlQsHEz2bNh5ATi3cGicu12bw",
          authDomain: "pjj-para-jiu-jitsu.firebaseapp.com",
          projectId: "pjj-para-jiu-jitsu",
          storageBucket: "pjj-para-jiu-jitsu.firebasestorage.app",
          messagingSenderId: "72563195814",
          appId: "1:72563195814:web:5bc90e7bc0c51f415c1967"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const valoresPlanos = {
            'Mensal': 90.00,
            'Trimestral': 240.00,
            'Semestral': 450.00,
            'Anual': 820.00
        };

        function carregarTema() {
            const temaSalvo = localStorage.getItem('tema') || 'escuro';
            const corpo = document.body;
            if (temaSalvo === 'claro') {
                corpo.classList.remove('tema-escuro');
                corpo.classList.add('tema-claro');
            } else {
                corpo.classList.remove('tema-claro');
                corpo.classList.add('tema-escuro');
            }
        }

        function formatarCPF(cpf) {
            return cpf.replace(/\D/g, '').replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
        }

        document.getElementById('cpfAluno').addEventListener('input', function() {
            this.value = formatarCPF(this.value);
        });

        function abrirFecharMenu() {
            document.getElementById('menuLateral').classList.toggle('aberto');
        }

        function atualizarValorPlano() {
            const tipo = document.getElementById('tipoAluno').value;
            const periodo = document.getElementById('periodoAluno').value;
            const desconto = parseFloat(document.getElementById('descontoAluno').value) || 0;
            const campoValor = document.getElementById('valorFinalAluno');

            if (!tipo || !periodo) {
                campoValor.value = 'Selecione o tipo e o plano';
                campoValor.className = 'valor-final valor-vazio';
                campoValor.removeAttribute('data-valor');
                return;
            }

            if (tipo === 'Bolsista') {
                campoValor.value = 'GRÁTIS';
                campoValor.className = 'valor-final valor-gratis';
            } else {
                const valorBase = valoresPlanos[periodo] || 0;
                const valorFinal = valorBase - (valorBase * desconto / 100);
                campoValor.value = `R$ ${valorFinal.toFixed(2).replace('.', ',')}`;
                campoValor.className = 'valor-final';
                campoValor.dataset.valor = valorFinal;
            }
        }

        // ✅ Carregamento igual ao financeiro, sem erros
        async function carregarAlunos() {
            const lista = document.getElementById('listaAlunos');
            lista.innerHTML = '<tr><td colspan="9" class="vazio">🔄 Carregando alunos...</td></tr>';

            try {
                const snapshot = await db.collection('alunos').get();

                if (snapshot.empty) {
                    lista.innerHTML = '<tr><td colspan="9" class="vazio">Nenhum aluno cadastrado ainda</td></tr>';
                    return;
                }

                // Ordena manualmente por nome
                const alunos = [];
                snapshot.forEach(doc => {
                    alunos.push({ id: doc.id, dados: doc.data() });
                });
                alunos.sort((a, b) => (a.dados.nome || '').localeCompare(b.dados.nome || ''));

                lista.innerHTML = '';
                alunos.forEach(aluno => {
                    const dados = aluno.dados;
                    const valorPlano = dados.valorPlano || 0;
                    const valorTexto = valorPlano === 0 ? 'GRÁTIS' : `R$ ${valorPlano.toFixed(2).replace('.', ',')}`;
                    const classeTipo = `tipo-${(dados.tipo || 'comercial').toLowerCase().replace(/\s/g, '-')}`;
                    const classeFaixa = `faixa-${(dados.faixa || 'branca').toLowerCase()}`;
                    const nascimento = dados.dataNascimento ? dados.dataNascimento.toDate().toLocaleDateString('pt-BR') : '-';
                    const cpf = dados.cpf ? formatarCPF(dados.cpf) : '-';

                    lista.innerHTML += `
                    <tr>
                        <td><strong>${dados.nome || '-'}</strong></td>
                        <td>${cpf}</td>
                        <td><span class="tipo-aluno ${classeTipo}">${dados.tipo || '-'}</span></td>
                        <td>${dados.responsavel || '-'}</td>
                        <td>${nascimento}</td>
                        <td>${dados.periodo || '-'}</td>
                        <td>${valorTexto}</td>
                        <td><span class="faixa ${classeFaixa}">${dados.faixa || '-'}</span></td>
                        <td>
                            <button class="btn-acao btn-editar" onclick="editarAluno('${aluno.id}')">Editar</button>
                            <button class="btn-acao btn-declaracao" onclick="abrirDeclaracao('${dados.nome}', '${dados.cpf || ''}')">Declaração</button>
                            <button class="btn-acao btn-excluir" onclick="excluirAluno('${aluno.id}')">Excluir</button>
                        </td>
                    </tr>`;
                });

            } catch (erro) {
                console.error('ERRO NO CARREGAMENTO:', erro);
                lista.innerHTML = `<tr><td colspan="9" class="vazio">Erro: ${erro.message}</td></tr>`;
            }
        }

        function abrirDeclaracao(nome, cpf) {
            window.open(`declaracao.html?nome=${encodeURIComponent(nome)}&cpf=${encodeURIComponent(cpf)}`, '_blank');
        }

        function abrirModalCadastro() {
            document.getElementById('idAluno').value = '';
            document.getElementById('tituloModal').textContent = 'Cadastrar Novo Aluno';
            document.getElementById('formAluno').reset();
            document.getElementById('vencimentoAluno').valueAsDate = new Date();
            document.getElementById('valorFinalAluno').value = 'Selecione o tipo e o plano';
            document.getElementById('valorFinalAluno').className = 'valor-final valor-vazio';
            document.getElementById('modalCadastro').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function fecharModalCadastro() {
            document.getElementById('modalCadastro').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        async function editarAluno(id) {
            try {
                const doc = await db.collection('alunos').doc(id).get();
                if (!doc.exists) return;

                const dados = doc.data();
                document.getElementById('idAluno').value = id;
                document.getElementById('tituloModal').textContent = 'Editar Aluno';
                document.getElementById('nomeAluno').value = dados.nome || '';
                document.getElementById('cpfAluno').value = dados.cpf ? formatarCPF(dados.cpf) : '';
                document.getElementById('tipoAluno').value = dados.tipo || '';
                document.getElementById('nascimentoAluno').value = dados.dataNascimento ? dados.dataNascimento.toDate().toISOString().split('T')[0] : '';
                document.getElementById('responsavelAluno').value = dados.responsavel || '';
                document.getElementById('telefoneAluno').value = dados.telefone || '';
                document.getElementById('emailAluno').value = dados.email || '';

                // ✅ Compatibilidade total com campos antigos
                const dataVenc = dados.dataVencimento || dados.dataInicioAula;
                document.getElementById('vencimentoAluno').value = dataVenc ? dataVenc.toDate().toISOString().split('T')[0] : '';

                document.getElementById('periodoAluno').value = dados.periodo || '';
                document.getElementById('descontoAluno').value = dados.desconto || 0;
                document.getElementById('faixaAluno').value = dados.faixa || '';

                atualizarValorPlano();
                document.getElementById('modalCadastro').style.display = 'flex';
                document.body.style.overflow = 'hidden';

            } catch (erro) {
                alert('Erro ao carregar: ' + erro.message);
            }
        }

        async function excluirAluno(id) {
            if (!confirm('Tem certeza que deseja excluir? Essa ação não pode ser desfeita.')) return;
            try {
                await db.collection('alunos').doc(id).delete();
                carregarAlunos();
            } catch (erro) {
                alert('Erro ao excluir: ' + erro.message);
            }
        }

        document.getElementById('formAluno').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('idAluno').value;
            const valorFinal = parseFloat(document.getElementById('valorFinalAluno').dataset.valor) || 0;
            const cpfSemFormatacao = document.getElementById('cpfAluno').value.replace(/\D/g, '');

            const dados = {
                nome: document.getElementById('nomeAluno').value.trim(),
                cpf: cpfSemFormatacao,
                tipo: document.getElementById('tipoAluno').value,
                dataNascimento: firebase.firestore.Timestamp.fromDate(new Date(document.getElementById('nascimentoAluno').value)),
                responsavel: document.getElementById('responsavelAluno').value.trim(),
                telefone: document.getElementById('telefoneAluno').value.trim(),
                email: document.getElementById('emailAluno').value.trim(),
                dataVencimento: firebase.firestore.Timestamp.fromDate(new Date(document.getElementById('vencimentoAluno').value)),
                periodo: document.getElementById('periodoAluno').value,
                desconto: parseFloat(document.getElementById('descontoAluno').value) || 0,
                valorPlano: valorFinal,
                faixa: document.getElementById('faixaAluno').value,
                statusPagamento: 'Pendente',
                dataCadastro: firebase.firestore.Timestamp.now()
            };

            try {
                if (id) {
                    // Remove campo antigo se existir
                    dados.dataInicioAula = firebase.firestore.FieldValue.delete();
                    await db.collection('alunos').doc(id).update(dados);
                    alert('Aluno atualizado!');
                } else {
                    await db.collection('alunos').add(dados);
                    alert('Aluno cadastrado!');
                }
                fecharModalCadastro();
                carregarAlunos();
            } catch (erro) {
                alert('Erro ao salvar: ' + erro.message);
            }
        });

        document.getElementById('buscaAluno').addEventListener('input', () => {
            const termo = document.getElementById('buscaAluno').value.toLowerCase();
            document.querySelectorAll('#listaAlunos tr').forEach(linha => {
                if (linha.classList.contains('vazio')) return;
                linha.style.display = linha.textContent.toLowerCase().includes(termo) ? '' : 'none';
            });
        });

        document.getElementById('filtroTipo').addEventListener('change', () => {
            const tipo = document.getElementById('filtroTipo').value.toLowerCase();
            document.querySelectorAll('#listaAlunos tr').forEach(linha => {
                if (linha.classList.contains('vazio')) return;
                linha.style.display = !tipo || linha.textContent.toLowerCase().includes(tipo) ? '' : 'none';
            });
        });

        document.getElementById('filtroPeriodo').addEventListener('change', () => {
            const periodo = document.getElementById('filtroPeriodo').value.toLowerCase();
            document.querySelectorAll('#listaAlunos tr').forEach(linha => {
                if (linha.classList.contains('vazio')) return;
                linha.style.display = !periodo || linha.textContent.toLowerCase().includes(periodo) ? '' : 'none';
            });
        });

        function sair() {
            if (confirm('Deseja sair do sistema?')) {
                auth.signOut().then(() => window.location.href = 'login.html');
            }
        }

        // ✅ MESMA INICIALIZAÇÃO DO FINANCEIRO
        auth.onAuthStateChanged(usuario => {
            if (!usuario) {
                window.location.href = 'login.html';
            } else {
                carregarTema();
                carregarAlunos();
            }
        });
    </script>

</body>
</html>
